<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Stock & Orders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="icon-192b.png">
<style>
  :root {
    --forest:#18443D; --forest-light:#9CC4BC; --cream:#FAF8F2; --card:#FFFFFF;
    --border:#E4DDD0; --ink:#20241F; --ink-soft:#3A362E; --muted:#6B6457; --faint:#A39C8C;
    --tint:#F4F0E8; --amber-bg:#F6E3D3; --amber-border:#E8B98A; --amber-text:#7A3E0E;
    --amber-strong:#C2710A; --red-bg:#F6E3D3; --red-text:#B3402A; --green:#DCEAE6; --whatsapp:#25D366;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; background:var(--cream); color:var(--ink); font-family:'Inter',-apple-system,sans-serif; }
  body { padding-bottom:84px; min-height:100vh; }
  h1,h2 { margin:0; }
  .font-display { font-family:'Space Grotesk',sans-serif; }
  .font-mono { font-family:'JetBrains Mono',monospace; }
  button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; -webkit-appearance:none; }
  input,select,textarea { font-family:inherit; font-size:15px; -webkit-appearance:none; appearance:none; }
  input[type=checkbox] { -webkit-appearance:auto; appearance:auto; width:18px; height:18px; accent-color:var(--forest); flex-shrink:0; }
  a { color:inherit; }
  .hidden { display:none !important; }

  .header { background:var(--forest); padding:20px 20px 14px; position:sticky; top:0; z-index:10; }
  .header .eyebrow { font-size:11px; letter-spacing:.05em; text-transform:uppercase; color:var(--forest-light); }
  .header h1 { font-size:22px; font-weight:700; color:var(--cream); }

  .main { padding:16px; max-width:640px; margin:0 auto; }
  .section { margin-bottom:24px; }
  .section-label { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.03em; color:var(--muted); margin-bottom:8px; }

  .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:12px; }
  .card + .card { margin-top:8px; }

  .btn { display:flex; align-items:center; justify-content:center; gap:6px; padding:12px; border-radius:12px; font-weight:500; font-size:14px; width:100%; }
  .btn-primary { background:var(--forest); color:var(--cream); }
  .btn-primary[disabled] { background:var(--border); color:var(--faint); }
  .btn-ghost { background:transparent; color:var(--muted); border:1px dashed #C9C2B2; }
  .btn-soft { background:var(--green); color:var(--forest); border:1px solid #B7CFC9; }
  .btn-sm { padding:6px 12px; border-radius:999px; font-size:12px; font-weight:500; width:auto; }
  .btn-whatsapp { background:var(--whatsapp); color:#fff; }
  .btn-cancel { background:var(--tint); color:var(--muted); }

  input[type=text],input[type=number],input[type=tel],input[type=date],input[type=search],select,textarea {
    width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--border); background:var(--cream); color:var(--ink);
  }
  textarea { resize:vertical; }
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:12px; font-weight:500; color:var(--muted); margin-bottom:4px; }
  .hint { font-size:12px; color:var(--faint); margin-top:-6px; margin-bottom:12px; }
  .warn-hint { font-size:12px; color:var(--amber-strong); margin-bottom:8px; }

  .chip { display:inline-flex; align-items:center; gap:4px; padding:6px 12px; border-radius:999px; font-size:12px; font-weight:500; }
  .tag { font-size:10px; padding:2px 6px; border-radius:999px; background:var(--tint); color:var(--muted); }

  .segmented { display:inline-flex; border:1px solid var(--border); border-radius:999px; overflow:hidden; }
  .segmented button { padding:5px 10px; font-size:12px; font-weight:500; color:var(--muted); }
  .segmented button.active { background:var(--forest); color:#fff; }

  .empty { text-align:center; padding:48px 16px; }
  .empty .title { font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:16px; margin-bottom:4px; }
  .empty .body { font-size:14px; color:var(--muted); margin-bottom:16px; }

  .nav { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--border); display:flex; justify-content:space-around; padding:8px 8px calc(8px + env(safe-area-inset-bottom)); z-index:20; }
  .nav button { display:flex; flex-direction:column; align-items:center; gap:2px; padding:6px 16px; border-radius:12px; position:relative; }
  .nav button svg { width:22px; height:22px; stroke:var(--faint); }
  .nav button span { font-size:11px; font-weight:500; color:var(--faint); }
  .nav button.active svg { stroke:var(--forest); }
  .nav button.active span { color:var(--forest); }
  .nav-badge { position:absolute; top:-2px; right:10px; background:var(--amber-strong); color:#fff; font-size:9px; font-weight:700; border-radius:999px; min-width:14px; height:14px; display:flex; align-items:center; justify-content:center; padding:0 3px; }

  .modal-page { position:fixed; inset:0; background:var(--cream); z-index:50; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .modal-head { position:sticky; top:0; display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:var(--cream); border-bottom:1px solid var(--border); z-index:2; }
  .modal-head h2 { font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:600; }
  .modal-close { background:var(--tint); border-radius:999px; padding:6px; }
  .modal-body { padding:20px; padding-bottom:40px; }

  .toast { position:fixed; left:16px; right:16px; top:16px; z-index:60; background:var(--ink); color:var(--cream); padding:12px 16px; border-radius:12px; font-size:14px; font-weight:500; box-shadow:0 8px 24px rgba(0,0,0,.2); }

  .row { display:flex; align-items:center; gap:8px; }
  .row-between { display:flex; align-items:center; justify-content:space-between; }
  .wrap { flex-wrap:wrap; }
  .gap2 { gap:8px; }
  .flex1 { flex:1; min-width:0; }
  .shrink0 { flex-shrink:0; }
  .mt2{margin-top:8px;} .mb2{margin-bottom:8px;} .mt1{margin-top:4px;} .mb1{margin-bottom:4px;}
  .truncate { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .text-xs{font-size:12px;} .text-sm{font-size:14px;}
  .muted{color:var(--muted);} .faint{color:var(--faint);}
  .qty-input { width:56px; padding:8px 4px; border-radius:9px; border:1.5px solid var(--forest); background:#F2F7F5; color:var(--forest); font-weight:700; font-size:16px; text-align:center; }
  .stepper-btn { width:26px; height:26px; border-radius:999px; display:flex; align-items:center; justify-content:center; }
  .index-badge { font-family:'JetBrains Mono',monospace; font-size:12px; width:20px; text-align:center; color:var(--faint); flex-shrink:0; }

  svg { display:block; }
  ::placeholder { color:var(--faint); }
  [data-hide-when-empty]:empty { display:none; }
</style>
</head>
<body>

<header class="header">
  <div class="eyebrow">Stock &amp; Orders</div>
  <h1 id="pageTitle" class="font-display">Orders</h1>
</header>

<main class="main" id="mainContent"></main>

<nav class="nav" id="bottomNav"></nav>

<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script>
'use strict';

/* ============================================================
   ICONS — minimal inline SVG helpers (mirrors the lucide icons used)
   ============================================================ */
function icon(name, size, color, extra) {
  size = size || 16; color = color || 'currentColor'; extra = extra || '';
  const paths = {
    plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
    x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
    trash: '<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>',
    send: '<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>',
    check: '<polyline points="20 6 9 17 4 12"/>',
    chevronRight: '<polyline points="9 18 15 12 9 6"/>',
    chevronUp: '<polyline points="18 15 12 9 6 15"/>',
    chevronDown: '<polyline points="6 9 12 15 18 9"/>',
    cornerDownRight: '<polyline points="15 10 20 15 15 20"/><path d="M4 4v7a4 4 0 0 0 4 4h12"/>',
    repeat: '<polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>',
    building: '<rect x="4" y="2" width="16" height="20" rx="1"/><line x1="9" y1="6" x2="9" y2="6.01"/><line x1="15" y1="6" x2="15" y2="6.01"/><line x1="9" y1="10" x2="9" y2="10.01"/><line x1="15" y1="10" x2="15" y2="10.01"/><line x1="9" y1="14" x2="9" y2="14.01"/><line x1="15" y1="14" x2="15" y2="14.01"/><line x1="9" y1="18" x2="15" y2="18"/>',
    mapPin: '<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/>',
    cart: '<circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>',
    package: '<line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>',
    users: '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
    clipboard: '<path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/>',
    alert: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',
    minus: '<line x1="5" y1="12" x2="19" y2="12"/>',
    trendingDown: '<polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/>',
    clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
  };
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ${extra}>${paths[name] || ''}</svg>`;
}

/* ============================================================
   PORTED BUSINESS LOGIC (dates, messages, real data) — unchanged from the app version
   ============================================================ */
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

const WEEKDAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

function parForDate(item, date) {
  const day = date.getDay();
  if (item.parByDay && item.parByDay[day] != null && item.parByDay[day] !== '') {
    return Number(item.parByDay[day]);
  }
  return item.par;
}

function toLocalDateStr(d) {
  // Local calendar date (YYYY-MM-DD) based on the device's own clock/timezone,
  // not UTC — toISOString() would shift the date near midnight in many timezones.
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function todayStr() {
  return toLocalDateStr(new Date());
}

function tomorrowStr() {
  const d = new Date();
  d.setDate(d.getDate() + 1);
  return toLocalDateStr(d);
}

function isStillIncoming(order) {
  // Assume delivered once we're past the expected date — no manual "received" step needed.
  const expected = order.expectedDate || (order.placedAt ? toLocalDateStr(new Date(order.placedAt)) : todayStr());
  return expected >= todayStr();
}

function pendingQtyForItem(itemId, orders, opts = {}) {
  const { onDate, throughDate, includeWarehouse = true } = opts;
  return orders
    .filter(isStillIncoming)
    .filter((o) => {
      const d = o.expectedDate || todayStr();
      if (throughDate) return d <= throughDate;
      if (onDate) return d === onDate;
      return true;
    })
    .reduce((sum, o) => {
      const line = o.items.find((i) => i.itemId === itemId);
      if (!line) return sum;
      if (!includeWarehouse && line.toOwnWarehouse) return sum;
      return sum + line.qty;
    }, 0);
}

function defaultOrderDate() {
  // After ~1pm, default to tomorrow to match typical supplier cutoffs — but this is just a
  // starting point; the date picker lets you account for holidays, closures, etc.
  return new Date().getHours() < 13 ? todayStr() : tomorrowStr();
}

function formatDateLabel(dateStr) {
  if (!dateStr) return '';
  if (dateStr === todayStr()) return 'Today';
  if (dateStr === tomorrowStr()) return 'Tomorrow';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString(undefined, { weekday: 'short', day: 'numeric', month: 'short' });
}

function effectivePickupWarehouseId(item, supplier) {
  return item?.defaultWarehouseId || supplier?.defaultWarehouseId || '';
}

function gaugeLevel(item, orders, date = new Date()) {
  // 0..1 fill, accounting for stock + incoming — excludes stock earmarked for your own
  // warehouse, since that won't land on the shop shelf this par level is meant to track.
  const par = parForDate(item, date);
  const pending = pendingQtyForItem(item.id, orders, { includeWarehouse: false });
  const total = item.stock + pending;
  if (par <= 0) return 1;
  return Math.max(0, Math.min(1, total / par));
}

const WEEKDAY_CN = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];

function chineseDayWord(dateStr, isAdditional, prefix) {
  let word;
  if (!dateStr || dateStr === todayStr()) word = isAdditional ? '今日加多' : '今日';
  else if (dateStr === tomorrowStr()) word = isAdditional ? '聽日加多' : '聽日';
  else {
    const d = new Date(dateStr + 'T00:00:00');
    const dateLabel = `${WEEKDAY_CN[d.getDay()]}${d.getMonth() + 1}月${d.getDate()}日`;
    word = isAdditional ? `${dateLabel}加多` : dateLabel;
  }
  return prefix ? `${prefix} ${word}` : word;
}

function buildMessage(supplierName, lines, dateStr, isAdditional, prefix) {
  const dayWord = chineseDayWord(dateStr, isAdditional, prefix);
  const formatLines = (arr) => arr.map((l) => `${l.qty}${l.unit || ''}${l.name}`).join('\n');
  const shopLines = lines.filter((l) => !l.toOwnWarehouse);
  const warehouseLines = lines.filter((l) => l.toOwnWarehouse);

  if (warehouseLines.length === 0) {
    // everything is going to the shop — no need to label it
    return `${dayWord}\n${formatLines(shopLines)}`;
  }
  if (shopLines.length === 0) {
    // everything is going to your own warehouse
    return `${dayWord}\n(葵):\n${formatLines(warehouseLines)}`;
  }
  // mixed order — keep the two destinations clearly separated so the driver isn't guessing
  return `${dayWord}\n舖:\n${formatLines(shopLines)}\n\n(葵):\n${formatLines(warehouseLines)}`;
}

async function sendOrShareMessage(phone, message, windowName) {
  // Always open-ended — no phone number is ever plugged in. WhatsApp opens with the
  // message pre-filled and lets the user pick one or more contacts or a group themselves.
  window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, windowName || `wa_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`);
  return 'opened';
}




/* ============================================================
   STORAGE — localStorage, with debounced writes so rapid state changes
   (typing a quantity, dragging, etc.) don't hammer the disk on every keystroke
   ============================================================ */
const STORAGE_PREFIX = 'stockOrderApp:';
const pendingWrites = {};
const writeTimers = {};

function loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(STORAGE_PREFIX + key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    console.error('load failed', key, e);
    return fallback;
  }
}

function saveJSONNow(key, value) {
  try {
    localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(value));
  } catch (e) {
    console.error('save failed', key, e);
  }
}

// Debounced save: coalesces bursts of writes to the same key into one disk write ~200ms later.
function saveJSONDebounced(key, value) {
  pendingWrites[key] = value;
  clearTimeout(writeTimers[key]);
  writeTimers[key] = setTimeout(() => {
    saveJSONNow(key, pendingWrites[key]);
    delete pendingWrites[key];
  }, 200);
}

function flushAllWrites() {
  Object.keys(writeTimers).forEach((key) => {
    clearTimeout(writeTimers[key]);
    if (key in pendingWrites) {
      saveJSONNow(key, pendingWrites[key]);
      delete pendingWrites[key];
    }
  });
}
window.addEventListener('beforeunload', flushAllWrites);
window.addEventListener('pagehide', flushAllWrites);

/* ============================================================
   STATE — a single global object. Renders are targeted (see render* functions)
   rather than one big re-render, to stay fast with 150-250 items.
   ============================================================ */
const state = {
  suppliers: loadJSON('suppliers', []),
  items: loadJSON('items', []),
  cart: loadJSON('cart', []),
  orders: loadJSON('orders', []),
  warehouses: loadJSON('warehouses', []),
  shipments: loadJSON('shipments', []),   // Key SKU contracted/spot shipments — see Runway tab
  tab: 'today',
  orderDate: defaultOrderDate(),
  draftQty: {},              // itemId -> string, not persisted (session-only, like the app version)
  dateOverrides: {},         // supplierId -> ISO date string (Cart tab per-supplier override)
  search: '',
  filterField: 'supplier',
  filterValue: '',
  onlyOrderedForDate: false,
  showWarehouses: false,
  showSuppliers: false,
  selectedWarehousesForDriverMsg: [],
  stockSearch: '',
  runwaySearch: '',
  incomingFilterDate: '',
  incomingCumulative: false,
  modal: null,               // { type: 'item'|'supplier'|'warehouse', mode:'new'|'edit', data, insertAfterId }
  editingPickupFor: null,    // cart line id
  editingSupplierFor: null,  // cart line id
  revisingOrderId: null,     // order id currently open for post-send revision
  scrollPositions: {},       // tab -> last scroll position (session-only, so returning to a tab picks up where you left off)
};

function persist(key) {
  saveJSONDebounced(key, state[key]);
}


/* ============================================================
   TOAST
   ============================================================ */
let toastTimer = null;
function showToast(msg) {
  const root = document.getElementById('toastRoot');
  root.innerHTML = `<div class="toast">${escapeHtml(msg)}</div>`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { root.innerHTML = ''; }, 3500);
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str == null ? '' : String(str);
  return d.innerHTML;
}

/* ============================================================
   DATA MUTATIONS — each updates state, persists (debounced), and re-renders
   only what's needed rather than the whole app.
   ============================================================ */
function updateSuppliers(next) { state.suppliers = next; persist('suppliers'); }
function updateItems(next) { state.items = next; persist('items'); }
function updateCart(next) { state.cart = next; persist('cart'); }
function updateOrders(next) { state.orders = next; persist('orders'); }
function updateWarehouses(next) { state.warehouses = next; persist('warehouses'); }
function updateShipments(next) { state.shipments = next; persist('shipments'); }

function effectiveSupplierId(cartLine, item) {
  return cartLine.supplierOverride || (item && item.supplierId);
}

function addToCart(itemId, qty) {
  if (!qty || qty <= 0) return;
  const item = state.items.find((i) => i.id === itemId);
  const supplier = state.suppliers.find((s) => s.id === (item && item.supplierId));
  const pickupWarehouseId = effectivePickupWarehouseId(item, supplier);
  updateCart([...state.cart, { id: uid(), itemId, qty, ...(pickupWarehouseId ? { pickupWarehouseId } : {}) }]);
  state.draftQty[itemId] = '';
}

function addAllToCart() {
  const entries = Object.entries(state.draftQty).filter(([, v]) => parseFloat(v) > 0);
  if (entries.length === 0) return;
  const newLines = entries.map(([itemId, v]) => {
    const qty = parseFloat(v);
    const item = state.items.find((i) => i.id === itemId);
    const supplier = state.suppliers.find((s) => s.id === (item && item.supplierId));
    const pickupWarehouseId = effectivePickupWarehouseId(item, supplier);
    return { id: uid(), itemId, qty, ...(pickupWarehouseId ? { pickupWarehouseId } : {}) };
  });
  updateCart([...state.cart, ...newLines]);
  entries.forEach(([itemId]) => { state.draftQty[itemId] = ''; });
}

function setCartQty(lineId, qty) {
  if (qty <= 0) {
    updateCart(state.cart.filter((c) => c.id !== lineId));
  } else {
    updateCart(state.cart.map((c) => (c.id === lineId ? { ...c, qty } : c)));
  }
}

function setCartPickupWarehouse(lineId, warehouseId) {
  updateCart(state.cart.map((c) => (c.id === lineId ? { ...c, pickupWarehouseId: warehouseId } : c)));
}

function setCartSupplierOverride(lineId, supplierId) {
  updateCart(state.cart.map((c) => {
    if (c.id !== lineId) return c;
    const item = state.items.find((i) => i.id === c.itemId);
    if (!item || supplierId === item.supplierId) {
      const { supplierOverride, ...rest } = c;
      return rest;
    }
    return { ...c, supplierOverride: supplierId };
  }));
}

function toggleCartWarehouse(lineId) {
  updateCart(state.cart.map((c) => (c.id === lineId ? { ...c, toOwnWarehouse: !c.toOwnWarehouse } : c)));
}

function computeCartGroups() {
  return state.suppliers
    .map((s) => {
      const lines = state.cart
        .map((c) => ({ ...c, item: state.items.find((i) => i.id === c.itemId) }))
        .filter((l) => l.item && effectiveSupplierId(l, l.item) === s.id);
      return { supplier: s, lines };
    })
    .filter((g) => g.lines.length > 0);
}

function computeIncomingOrders() {
  return state.orders.filter(isStillIncoming).sort((a, b) => a.placedAt.localeCompare(b.placedAt));
}

function sendSupplierOrder(group, dateStr) {
  const { supplier, lines } = group;
  const expectedDate = dateStr || todayStr();
  const isAdditional = state.orders.some((o) => o.supplierId === supplier.id && o.expectedDate === expectedDate);
  const prefix = supplier.isInternalAccount ? supplier.name : undefined;
  const message = buildMessage(
    supplier.name,
    lines.map((l) => ({ name: l.item.name, qty: l.qty, unit: l.item.unit, toOwnWarehouse: l.toOwnWarehouse })),
    expectedDate,
    isAdditional,
    prefix
  );
  sendOrShareMessage(supplier.whatsapp, message, 'wa_supplier').then(() => {
    showToast(`Opened WhatsApp for ${supplier.name} — pick who to send it to.`);
  });

  const newOrder = {
    id: uid(),
    supplierId: supplier.id,
    supplierName: supplier.name,
    items: lines.map((l) => ({
      itemId: l.itemId,
      qty: l.qty,
      name: l.item.name,
      unit: l.item.unit,
      toOwnWarehouse: l.toOwnWarehouse || false,
      pickupWarehouseId: l.pickupWarehouseId || '',
    })),
    placedAt: new Date().toISOString(),
    expectedDate,
    status: 'pending',
  };
  // Key SKU link: deduct this order from the supplier's landed shipments
  // (earliest rent-free deadline first) and remember what was taken so
  // Undo can put it back exactly.
  newOrder.drawdowns = applyDrawdownsForOrder(newOrder);
  updateOrders([...state.orders, newOrder]);
  updateCart(state.cart.filter((c) => !lines.some((l) => l.id === c.id)));
  renderTab();
}

function cancelOrder(order) {
  revertDrawdownsForOrder(order); // put any Key SKU drawdowns back on their shipments
  updateOrders(state.orders.filter((o) => o.id !== order.id));
  const restoredLines = order.items.map((line) => {
    const item = state.items.find((i) => i.id === line.itemId);
    const override = item && item.supplierId !== order.supplierId ? order.supplierId : undefined;
    return {
      id: uid(),
      itemId: line.itemId,
      qty: line.qty,
      ...(override ? { supplierOverride: override } : {}),
      ...(line.toOwnWarehouse ? { toOwnWarehouse: true } : {}),
      ...(line.pickupWarehouseId ? { pickupWarehouseId: line.pickupWarehouseId } : {}),
    };
  });
  updateCart([...state.cart, ...restoredLines]);
  renderTab();
}

function setOrderLineQty(orderId, itemIndex, qty) {
  if (!qty || qty <= 0) { removeOrderLine(orderId, itemIndex); return; }
  updateOrders(state.orders.map((o) => {
    if (o.id !== orderId) return o;
    return { ...o, items: o.items.map((line, idx) => (idx === itemIndex ? { ...line, qty } : line)) };
  }));
}

function setOrderLinePickupWarehouse(orderId, itemIndex, warehouseId) {
  updateOrders(state.orders.map((o) => {
    if (o.id !== orderId) return o;
    return { ...o, items: o.items.map((line, idx) => (idx === itemIndex ? { ...line, pickupWarehouseId: warehouseId } : line)) };
  }));
}

function removeOrderLine(orderId, itemIndex) {
  const order = state.orders.find((o) => o.id === orderId);
  if (!order) return;
  const remaining = order.items.filter((_, idx) => idx !== itemIndex);
  if (remaining.length === 0) {
    updateOrders(state.orders.filter((o) => o.id !== orderId));
    state.revisingOrderId = null;
  } else {
    updateOrders(state.orders.map((o) => (o.id === orderId ? { ...o, items: remaining } : o)));
  }
}

/* ---- suppliers / items / warehouses CRUD ---- */
function saveSupplier(data) {
  if (data.id) {
    updateSuppliers(state.suppliers.map((s) => (s.id === data.id ? data : s)));
  } else {
    updateSuppliers([...state.suppliers, { ...data, id: uid() }]);
  }
  closeModal();
}
function deleteSupplier(id) {
  updateSuppliers(state.suppliers.filter((s) => s.id !== id));
  closeModal();
}

function saveItem(data) {
  const { insertAfterId, ...rest } = data;
  if (rest.id) {
    updateItems(state.items.map((i) => (i.id === rest.id ? rest : i)));
  } else {
    const newItem = { ...rest, id: uid() };
    if (insertAfterId) {
      const idx = state.items.findIndex((i) => i.id === insertAfterId);
      const next = [...state.items];
      next.splice(idx + 1, 0, newItem);
      updateItems(next);
    } else {
      updateItems([...state.items, newItem]);
    }
  }
  closeModal();
}
function deleteItem(id) {
  updateItems(state.items.filter((i) => i.id !== id));
  closeModal();
}
function moveItem(id, direction) {
  const idx = state.items.findIndex((i) => i.id === id);
  const swapWith = direction === 'up' ? idx - 1 : idx + 1;
  if (idx === -1 || swapWith < 0 || swapWith >= state.items.length) return;
  const next = [...state.items];
  [next[idx], next[swapWith]] = [next[swapWith], next[idx]];
  updateItems(next);
  renderTab();
}

function saveWarehouse(data) {
  if (data.id) {
    updateWarehouses(state.warehouses.map((w) => (w.id === data.id ? data : w)));
  } else {
    updateWarehouses([...state.warehouses, { ...data, id: uid() }]);
  }
  closeModal();
}
function deleteWarehouse(id) {
  updateWarehouses(state.warehouses.filter((w) => w.id !== id));
  updateSuppliers(state.suppliers.map((s) => (s.defaultWarehouseId === id ? { ...s, defaultWarehouseId: '' } : s)));
  updateItems(state.items.map((i) => (i.defaultWarehouseId === id ? { ...i, defaultWarehouseId: '' } : i)));
  updateCart(state.cart.map((c) => {
    if (c.pickupWarehouseId !== id) return c;
    const { pickupWarehouseId, ...rest } = c;
    return rest;
  }));
  closeModal();
}

// Import/export: reads/writes a plain JSON file chosen from the device itself.
// Nothing here is baked into the app's code, so no business data is ever public.
function exportDataToFile() {
  const data = {
    suppliers: state.suppliers,
    items: state.items,
    warehouses: state.warehouses,
    orders: state.orders,
    cart: state.cart,
    shipments: state.shipments,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `stock-orders-backup-${todayStr()}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  const stillPending = data.orders.filter(isStillIncoming).length;
  showToast(`Backup saved: ${data.suppliers.length} suppliers, ${data.items.length} items, ${data.cart.length} in cart, ${stillPending} pending orders.`);
}

function importDataFromFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data || typeof data !== 'object') throw new Error('bad format');
      if (Array.isArray(data.suppliers)) updateSuppliers(data.suppliers);
      if (Array.isArray(data.items)) updateItems(data.items);
      if (Array.isArray(data.warehouses)) updateWarehouses(data.warehouses);
      if (Array.isArray(data.orders)) updateOrders(data.orders);
      if (Array.isArray(data.cart)) updateCart(data.cart);
      if (Array.isArray(data.shipments)) updateShipments(data.shipments);
      renderTab();
      showToast('Data imported.');
    } catch (err) {
      showToast("Couldn't read that file — is it the right export?");
    }
  };
  reader.readAsText(file);
}


/* ============================================================
   APP SHELL — header, bottom nav, top-level render dispatch
   ============================================================ */
const TABS = [
  { key: 'today', label: 'Orders', icon: 'clipboard', title: 'Orders' },
  { key: 'cart', label: 'Cart', icon: 'cart', title: 'Cart' },
  { key: 'stock', label: 'Stock', icon: 'package', title: 'Stock' },
  { key: 'runway', label: 'Runway', icon: 'trendingDown', title: 'Key SKU Runway' },
  { key: 'suppliers', label: 'Suppliers', icon: 'users', title: 'Suppliers' },
];

function setTab(tab) {
  // Remember exactly where we were on the tab we're leaving...
  state.scrollPositions[state.tab] = window.scrollY;
  state.tab = tab;
  renderTab();
  renderNav();
  // ...and jump back to that spot if we've visited this tab before this session (else top, as before).
  const restoreY = state.scrollPositions[tab] || 0;
  requestAnimationFrame(() => window.scrollTo(0, restoreY));
}

function renderNav() {
  const nav = document.getElementById('bottomNav');
  nav.innerHTML = TABS.map((t) => {
    const active = state.tab === t.key ? 'active' : '';
    const badge = t.key === 'cart' && state.cart.length > 0
      ? `<span class="nav-badge">${state.cart.length > 99 ? '99+' : state.cart.length}</span>` : '';
    return `<button data-tab="${t.key}" class="${active}">
      <span style="position:relative;display:block;">${icon(t.icon, 22)}${badge}</span>
      <span>${t.label}</span>
    </button>`;
  }).join('');
  document.getElementById('pageTitle').textContent = TABS.find((t) => t.key === state.tab).title;
}
document.getElementById('bottomNav').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-tab]');
  if (btn) setTab(btn.dataset.tab);
});

function renderTab() {
  const main = document.getElementById('mainContent');
  document.getElementById('pageTitle').textContent = TABS.find((t) => t.key === state.tab).title;
  if (state.tab === 'today') { main.innerHTML = renderOrdersTab(); filterOrderListRows(); }
  else if (state.tab === 'cart') main.innerHTML = renderCartTab();
  else if (state.tab === 'stock') { main.innerHTML = renderStockTab(); filterStockRows(); }
  else if (state.tab === 'runway') { main.innerHTML = renderRunwayTab(); filterRunwayRows(); }
  else if (state.tab === 'suppliers') main.innerHTML = renderSuppliersTab();
  renderNav(); // badge count may have changed
  wireTabEvents();
}


/* ============================================================
   ORDERS TAB
   ============================================================ */
const FILTER_FIELDS = [
  {
    key: 'supplier', label: 'Supplier',
    getOptions: (items, suppliers) => suppliers.map((s) => ({ value: s.id, label: s.name })),
    matches: (item, value) => item.supplierId === value,
  },
  {
    key: 'tag', label: 'Tag',
    getOptions: (items) => Array.from(new Set(items.flatMap((it) => it.tags || []))).sort().map((t) => ({ value: t, label: t })),
    matches: (item, value) => (item.tags || []).includes(value),
  },
];

function computeIncomingBreakdown(orders, orderDate) {
  const map = {};
  orders.forEach((o) => {
    if (!isStillIncoming(o)) return;
    const d = o.expectedDate || todayStr();
    o.items.forEach((line) => {
      if (line.toOwnWarehouse) return;
      if (!map[line.itemId]) map[line.itemId] = { cumulative: 0, exact: 0, future: 0 };
      if (d <= orderDate) map[line.itemId].cumulative += line.qty;
      if (d === orderDate) map[line.itemId].exact += line.qty;
      if (d > orderDate) map[line.itemId].future += line.qty;
    });
  });
  return map;
}

function renderOrdersTab() {
  if (state.suppliers.length === 0 || state.items.length === 0) {
    return renderEmptyState(
      "Let's set up your stock list",
      'Add your suppliers and items first, then your daily order list builds itself.',
      state.suppliers.length === 0 ? 'Add a supplier' : 'Add stock items',
      "goToSetup()"
    );
  }

  const incomingBreakdown = computeIncomingBreakdown(state.orders, state.orderDate);
  const activeFilterFields = FILTER_FIELDS.filter((f) => f.getOptions(state.items, state.suppliers).length > 0);
  let activeFilterDef = activeFilterFields.find((f) => f.key === state.filterField) || activeFilterFields[0];

  const list = state.items
    .map((it, idx) => ({ item: it, index: idx + 1 }))
    .filter((x) => !x.item.inactive)
    .filter((x) => !state.filterValue || !activeFilterDef || activeFilterDef.matches(x.item, state.filterValue))
    .filter((x) => !state.onlyOrderedForDate || ((incomingBreakdown[x.item.id] && incomingBreakdown[x.item.id].exact) || 0) > 0);

  const pendingEntryCount = Object.values(state.draftQty).filter((v) => parseFloat(v) > 0).length;
  const orderingForToday = state.orderDate === todayStr();

  const rowsHtml = list.map(({ item, index }) => {
    const draft = state.draftQty[item.id] || '';
    const b = incomingBreakdown[item.id] || { cumulative: 0, exact: 0, future: 0 };
    const hasIncoming = orderingForToday ? (b.exact > 0 || b.future > 0) : (b.cumulative > 0 || b.exact > 0 || b.future > 0);
    const supplier = state.suppliers.find((s) => s.id === item.supplierId);
    const pickupWarehouse = state.warehouses.find((w) => w.id === effectivePickupWarehouseId(item, supplier));
    const incomingText = hasIncoming
      ? (orderingForToday ? `${b.exact} | ${b.future}` : `${b.cumulative} | ${b.exact} | ${b.future}`)
      : '';
    const tagsHtml = (item.tags || []).length
      ? `<div class="row wrap" style="gap:4px;margin-top:2px;">${item.tags.map((t) => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>` : '';
    const nameLower = item.name.toLowerCase();
    const codeLower = (item.itemCode || '').toLowerCase();
    return `
      <div class="card" data-order-row data-name="${escapeHtml(nameLower)}" data-code="${escapeHtml(codeLower)}">
        <div class="row" style="gap:10px;">
          <span class="index-badge">#${index}</span>
          <div class="flex1">
            <div class="text-sm truncate" style="font-weight:500;color:var(--ink);">${escapeHtml(item.name)}</div>
            <div class="text-xs truncate muted">${escapeHtml(supplier ? supplier.name : 'No supplier')} · ${escapeHtml(pickupWarehouse ? pickupWarehouse.name : 'varies')}</div>
            ${tagsHtml}
            ${hasIncoming ? `<div class="text-xs truncate font-mono muted" data-incoming-text>${incomingText}</div>` : ''}
          </div>
          <div class="shrink0" style="text-align:center;">
            <span style="font-size:9px;text-transform:uppercase;letter-spacing:.03em;color:var(--forest);">Qty</span>
            <div class="row" style="gap:6px;">
              <input type="number" inputmode="decimal" placeholder="0" value="${draft}" data-draft-qty="${item.id}"
                class="qty-input" style="width:56px;">
              <button data-add-to-cart="${item.id}" class="stepper-btn" style="background:var(--forest);width:36px;height:36px;">
                ${icon('plus', 15, '#fff')}
              </button>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');

  return `
    <div>
      ${renderOrderDateHeader()}

      <section class="section">
        <div class="row-between mb2">
          <div class="section-label" style="margin-bottom:0;">Order list</div>
          <button id="addAllBtn" data-add-all class="btn-sm" ${pendingEntryCount === 0 ? 'disabled' : ''}
            style="display:flex;align-items:center;gap:6px;background:${pendingEntryCount > 0 ? 'var(--forest)' : 'var(--border)'};color:${pendingEntryCount > 0 ? '#fff' : 'var(--faint)'};">
            ${icon('plus', 13, pendingEntryCount > 0 ? '#fff' : 'var(--faint)')} <span id="addAllLabel">Add all${pendingEntryCount > 0 ? ` (${pendingEntryCount})` : ''} to cart</span>
          </button>
        </div>

        <p class="text-xs faint mb2">${orderingForToday ? 'Numbers = incoming today, incoming after today' : `Numbers = total incoming so far, incoming on ${formatDateLabel(state.orderDate)}, incoming after`}</p>

        <input type="search" id="orderSearch" placeholder="Search items or item code…" value="${escapeHtml(state.search)}" class="mb2">

        <div class="row wrap gap2 mb2">
          ${activeFilterFields.length > 1 ? `
            <select id="filterFieldSelect" style="width:auto;font-size:13px;padding:6px 8px;">
              ${activeFilterFields.map((f) => `<option value="${f.key}" ${f.key === (activeFilterDef && activeFilterDef.key) ? 'selected' : ''}>Filter by: ${f.label}</option>`).join('')}
            </select>` : ''}
          ${activeFilterDef ? `
            <select id="filterValueSelect" style="width:auto;font-size:13px;padding:6px 8px;">
              <option value="">All ${activeFilterDef.label.toLowerCase()}s</option>
              ${activeFilterDef.getOptions(state.items, state.suppliers).map((o) => `<option value="${escapeHtml(o.value)}" ${o.value === state.filterValue ? 'selected' : ''}>${escapeHtml(o.label)}</option>`).join('')}
            </select>` : ''}
          ${(state.filterValue || state.search || state.onlyOrderedForDate) ? `<button id="clearFiltersBtn" class="text-xs" style="font-weight:500;color:var(--amber-strong);">Clear filters</button>` : ''}
        </div>

        <label class="row" style="gap:8px;margin-bottom:12px;cursor:pointer;">
          <input type="checkbox" id="onlyOrderedCheckbox" ${state.onlyOrderedForDate ? 'checked' : ''}>
          <span class="text-xs muted">Only items already ordered for ${formatDateLabel(state.orderDate)}</span>
        </label>

        <div id="orderListRows" style="display:flex;flex-direction:column;gap:8px;">
          ${list.length === 0 ? `<p class="text-sm muted" style="text-align:center;padding:24px 0;">No items match your search.</p>` : rowsHtml}
        </div>
      </section>
    </div>`;
}

function renderOrderDateHeader() {

/* ============================================================
   RUNWAY ENGINE — Key SKU simulation (contracted vs. spot shipments,
   gap/stockout projection, rent-free deadline tracking)

   Only items with keySku === true are ever touched by this. Everything
   else on Stock just uses par vs. stock, same as before — no change.
   ============================================================ */
function daysFromToday(dateStr) {
  if (!dateStr) return null;
  const d0 = new Date(todayStr() + 'T00:00:00');
  const d1 = new Date(dateStr + 'T00:00:00');
  return Math.round((d1 - d0) / 86400000);
}

// ---- Core simulation ------------------------------------------------------
// Batch-level model. Each shipment is tracked as its own batch so we always
// know how much of THAT batch is left on any given day — pooling them together
// made rent exposure wrong (an in-transit batch inflated a landed batch's
// figure). Consumption is drawn from batches earliest-rent-deadline first,
// matching the drawdown rule used when orders are sent.
//
// Consumption per day, in priority order:
//   1. A pending order scheduled that day  -> use its ACTUAL quantity.
//   2. Day is within the ordering horizon (state.orderDate) with no order
//      -> consume 0. Ordering for that day is done; nothing was ordered.
//   3. Otherwise -> forecast using the average burn rate.
// This stops the average burn being applied to days we already have real
// answers for (user formula: D = P + (S−A)/R).

// Pending (not yet picked up) drawdowns hitting a given shipment.
function pendingDrawdownForShipment(shipmentId) {
  return state.orders.reduce((sum, o) => {
    if (!isStillIncoming(o) || !o.drawdowns) return sum;
    return sum + o.drawdowns
      .filter((d) => d.shipmentId === shipmentId)
      .reduce((s2, d) => s2 + (Number(d.qty) || 0), 0);
  }, 0);
}

// What's physically still in the warehouse for a shipment: its remaining
// balance, plus anything a pending order has claimed but not yet collected.
function physicalRemaining(s) {
  return shipmentRemaining(s) + pendingDrawdownForShipment(s.id);
}

// Horizon: five months. Long enough to see a contract loading in Sept arrive
// in Nov and be consumed into Dec; short enough that the coverage bar stays
// readable on a phone. This is all numbers/dates now — no curve — so the
// horizon is chosen for usefulness, not for what fits on a chart.
const SIM_DAYS = 150;

// Turn a day-offset into a date string.
function dayToDateStr(day) {
  const d = new Date();
  d.setDate(d.getDate() + day);
  return toLocalDateStr(d);
}

// Near-term dates are stated precisely; anything further out is deliberately
// rough ("~mid-Nov"), because a burn-rate projection months ahead is an
// estimate and shouldn't pretend otherwise.
function roughDateLabel(day) {
  if (day == null) return '—';
  const d = new Date();
  d.setDate(d.getDate() + day);
  if (day <= 14) return formatDateLabel(toLocalDateStr(d));
  const dom = d.getDate();
  const part = dom <= 10 ? 'early' : dom <= 20 ? 'mid' : 'late';
  const mon = d.toLocaleDateString(undefined, { month: 'short' });
  const yr = d.getFullYear() !== new Date().getFullYear() ? ' ' + d.getFullYear() : '';
  return `~${part} ${mon}${yr}`;
}

function simulateItemRunway(item, shipments, days = SIM_DAYS) {
  const floor = parForDate(item, new Date());
  const burn = effectiveBurn(item);
  const itemShipments = shipments.filter((s) => s.itemId === item.id);
  const itemShipmentIds = new Set(itemShipments.map((s) => s.id));
  const horizonDay = Math.max(0, daysFromToday(state.orderDate || todayStr()));

  // Known pickups: qty drawn from THIS item's shipments, by day.
  const scheduled = {};
  state.orders.forEach((o) => {
    if (!isStillIncoming(o) || !o.drawdowns || !o.drawdowns.length) return;
    const qty = o.drawdowns
      .filter((d) => itemShipmentIds.has(d.shipmentId))
      .reduce((sum, d) => sum + (Number(d.qty) || 0), 0);
    if (qty <= 0) return;
    const day = Math.max(0, Math.min(daysFromToday(o.expectedDate || todayStr()), days));
    scheduled[day] = (scheduled[day] || 0) + qty;
  });

  // Build batches. Landed = available from day 0. In transit = available from
  // its ETA day (a past ETA means late, so treat it as arriving today).
  const batches = itemShipments.map((s) => ({
    id: s.id,
    shipment: s,
    arriveDay: s.received ? 0 : Math.max(0, daysFromToday(s.etaDate)),
    qty: physicalRemaining(s),
    deadline: s.rentFreeDeadline || '9999-99-99', // no deadline = drawn last
    perDay: [], // own remaining, by day
  })).filter((b) => b.qty > 0 && b.arriveDay <= days);

  // "Other stock" (the manual box) — loose stock with no shipment or deadline.
  const otherQty = Number(item.stockAvailable) || 0;
  if (otherQty > 0) {
    batches.push({ id: '__other', shipment: null, arriveDay: 0, qty: otherQty, deadline: '9999-99-99', perDay: [] });
  }

  const drawOrder = [...batches].sort((a, b) => a.deadline.localeCompare(b.deadline));
  const rows = [];
  const restockDays = [];

  for (let day = 0; day <= days; day++) {
    if (day > 0 && batches.some((b) => b.arriveDay === day)) restockDays.push(day);

    // Balance = everything that has arrived and isn't used up.
    const balance = batches.reduce((sum, b) => sum + (b.arriveDay <= day ? b.qty : 0), 0);
    // In transit = booked stock that hasn't landed yet as of this day.
    const inTransit = batches.reduce((sum, b) => sum + (b.arriveDay > day ? b.qty : 0), 0);
    rows.push({ day, balance, inTransit, total: balance + inTransit });
    batches.forEach((b) => { b.perDay[day] = b.arriveDay <= day ? b.qty : 0; });

    if (day >= days) break;

    // Consume: actual if known, 0 if ordering for that day is done, else forecast.
    let consume;
    if (scheduled[day] != null) consume = scheduled[day];
    else if (day <= horizonDay) consume = 0;
    else consume = burn;

    let left = consume;
    for (const b of drawOrder) {
      if (left <= 0) break;
      if (b.arriveDay > day) continue; // not here yet — can't take from it
      const take = Math.min(b.qty, left);
      b.qty -= take;
      left -= take;
    }
  }

  return { rows, restockDays, floor, batches, horizonDay };
}

// Ranges (inclusive day spans) where balance is at/below zero — real stockouts.
function stockoutRanges(rows) {
  const ranges = [];
  let start = null;
  rows.forEach((r) => {
    if (r.balance <= 0 && start === null) start = r.day;
    if (r.balance > 0 && start !== null) { ranges.push([start, r.day - 1]); start = null; }
  });
  if (start !== null) ranges.push([start, rows[rows.length - 1].day]);
  return ranges;
}

// Rent exposure: how much of THIS batch will still be sitting in the warehouse
// when its own rent-free deadline hits. Read from that batch's own depletion
// curve, so other shipments can't inflate or mask it.
//
// This deliberately includes batches still IN TRANSIT: a contract landing in
// Nov whose rent-free window closes in Dec can absolutely outstay it, and
// that's precisely the "am I burning too slow / did I book too much" warning
// worth having while there's still time to act. What matters is whether the
// batch has arrived by its OWN deadline day, not whether it's landed today.
// (The coverage bar already worked this way — the text used to disagree.)
function rentExposuresForItem(item, shipments, sim) {
  const lastDay = sim.rows.length ? sim.rows[sim.rows.length - 1].day : 0;
  return sim.batches
    .filter((b) => b.shipment && b.shipment.rentFreeDeadline)
    .map((b) => {
      const rawDay = daysFromToday(b.shipment.rentFreeDeadline);
      if (rawDay == null) return null;
      if (rawDay > lastDay) return null;      // deadline past the forecast window — can't see it
      if (rawDay < b.arriveDay) return null;  // deadline before it even lands — nothing sitting there yet
      const day = Math.max(0, rawDay);
      const qtyAtDeadline = b.perDay[day] || 0; // this batch's own remaining
      if (qtyAtDeadline <= 0) return null;      // burns down in time — no exposure
      // "Paying rent now" only if it's actually here AND the date has passed.
      const past = rawDay <= 0 && b.arriveDay <= 0;
      return { shipment: b.shipment, day, qtyAtDeadline, past };
    })
    .filter(Boolean);
}

function keySkuStatus(item) {
  const sim = simulateItemRunway(item, state.shipments);
  const { rows, floor } = sim;
  const outages = stockoutRanges(rows);
  // Only gaps opening soon are alarming — a gap 8 months out is just business.
  const nearOutages = outages.filter(([s]) => s <= ALERT_WINDOW_DAYS);
  const rentExposures = rentExposuresForItem(item, state.shipments, sim);
  const belowFloorDays = rows.filter((r) => r.balance > 0 && r.balance < floor).length;
  const base = { sim, outages, nearOutages, rentExposures, floor };
  if (nearOutages.length) return { ...base, level: 'stockout' };
  if (rentExposures.length) return { ...base, level: 'rent' };
  if (belowFloorDays > 0) return { ...base, level: 'gap' };
  return { ...base, level: 'ok' };
}

// For the timeline: when each batch lands and when it's projected to run out.
// emptyDay = first day at/after arrival where this batch's own balance is zero.
function batchLifecycle(sim) {
  const lastDay = sim.rows.length ? sim.rows[sim.rows.length - 1].day : 0;
  return sim.batches.map((b) => {
    let emptyDay = null;
    for (let d = b.arriveDay; d <= lastDay; d++) {
      if ((b.perDay[d] || 0) <= 0) { emptyDay = d; break; }
    }
    return { ...b, emptyDay };
  });
}

// A gap 300 days out is normal business, not an alarm. Only gaps opening
// within this window raise an alert — everything else is still drawn on the
// coverage bar, just not shouted about.
const ALERT_WINDOW_DAYS = 60;

// Classify every day as covered / rent-accruing / empty, then merge into runs
// so the coverage bar draws a handful of rects instead of 365.
function coverageSegments(sim) {
  const lastDay = sim.rows.length ? sim.rows[sim.rows.length - 1].day : 0;
  const stateOf = (day) => {
    const row = sim.rows[day];
    if (!row || row.balance <= 0) return 'gap';
    // Rent accrues on a batch that has landed, is past its rent-free date,
    // and still has stock sitting in it.
    const renting = sim.batches.some((b) => {
      if (!b.shipment || !b.shipment.rentFreeDeadline) return false;
      const dl = daysFromToday(b.shipment.rentFreeDeadline);
      return b.arriveDay <= day && dl != null && dl <= day && (b.perDay[day] || 0) > 0;
    });
    return renting ? 'rent' : 'covered';
  };
  const segs = [];
  let start = 0;
  let cur = stateOf(0);
  for (let day = 1; day <= lastDay; day++) {
    const s = stateOf(day);
    if (s !== cur) { segs.push({ state: cur, from: start, to: day - 1 }); start = day; cur = s; }
  }
  segs.push({ state: cur, from: start, to: lastDay });
  return segs;
}

const COVERAGE_COLORS = { covered: 'var(--forest)', rent: 'var(--amber-strong)', gap: '#C0503A' };

// Horizontal coverage bar — no Y axis, just "am I covered on this date".
// All bars share the same 12-month scale, so gaps line up vertically across
// items and you can spot four SKUs going dry the same month at a glance.
function renderCoverageBar(sim, opts = {}) {
  const { height = 12, showMonths = false } = opts;
  const lastDay = sim.rows.length ? sim.rows[sim.rows.length - 1].day : 0;
  if (!lastDay) return '';
  const w = 300;
  const h = height + (showMonths ? 12 : 0);
  const x = (d) => (d / lastDay) * w;

  const rects = coverageSegments(sim).map((s) =>
    `<rect x="${x(s.from).toFixed(1)}" y="0" width="${Math.max(0.7, x(s.to + 1) - x(s.from)).toFixed(1)}" height="${height}" fill="${COVERAGE_COLORS[s.state]}" opacity="${s.state === 'covered' ? 0.85 : 1}"/>`
  ).join('');

  // Month boundaries as faint ticks; labelled when asked.
  const ticks = [];
  const today = new Date();
  for (let mo = 1; mo <= 6; mo++) {
    const d = new Date(today.getFullYear(), today.getMonth() + mo, 1);
    const day = Math.round((d - new Date(todayStr() + 'T00:00:00')) / 86400000);
    if (day < 0 || day > lastDay) continue;
    ticks.push(`<line x1="${x(day).toFixed(1)}" y1="0" x2="${x(day).toFixed(1)}" y2="${height}" stroke="#fff" stroke-width="0.8" opacity="0.55"/>`);
    if (showMonths) {
      ticks.push(`<text x="${x(day).toFixed(1)}" y="${height + 9}" font-size="8" fill="var(--faint)" text-anchor="middle">${d.toLocaleDateString(undefined, { month: 'short' })}</text>`);
    }
  }

  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:${h}px;display:block;border-radius:3px;overflow:visible;">
    ${rects}${ticks.join('')}
  </svg>`;
}

const RUNWAY_LEVEL_META = {
  stockout: { label: 'Stockout', bg: 'var(--red-bg)', text: 'var(--red-text)' },
  rent: { label: 'Rent risk', bg: 'var(--amber-bg)', text: 'var(--amber-text)' },
  gap: { label: 'Below floor', bg: 'var(--amber-bg)', text: 'var(--amber-strong)' },
  ok: { label: 'OK', bg: 'var(--green)', text: 'var(--forest)' },
};

/* ============================================================
   RUNWAY TAB — only Key SKUs (active items with keySku === true) show up here
   ============================================================ */
function renderRunwayTab() {
  const keyItems = state.items.filter((i) => i.keySku && !i.inactive);
  if (keyItems.length === 0) {
    return renderEmptyState('No Key SKUs yet', 'Open a stock item and tick "Track as Key SKU" to start watching its contracts and rent deadlines here.');
  }
  const levelOrder = { stockout: 0, rent: 1, gap: 2, ok: 3 };
  const rowsData = keyItems.map((item) => ({ item, status: keySkuStatus(item) }))
    .sort((a, b) => levelOrder[a.status.level] - levelOrder[b.status.level]);

  const rows = rowsData.map(({ item, status }) => {
    const meta = RUNWAY_LEVEL_META[status.level];
    const unitStr = item.unit ? ' ' + escapeHtml(item.unit) : '';
    let detail = '';
    if (status.level === 'stockout') {
      const [s] = status.nearOutages[0];
      detail = `Runs out ${roughDateLabel(s)} — spot buy or book stock`;
    } else if (status.level === 'rent') {
      const worst = Math.max(...status.rentExposures.map((x) => x.qtyAtDeadline));
      const anyPast = status.rentExposures.some((x) => x.past);
      detail = anyPast
        ? `~${worst}${unitStr} paying rent now — move out or burn down`
        : `~${worst}${unitStr} still here when rent-free ends`;
    } else if (status.level === 'gap') {
      detail = 'Dips below safety floor';
    } else {
      const [s] = status.outages[0] || [];
      detail = s != null ? `Covered until ${roughDateLabel(s)}` : 'Covered — no gaps or rent risk';
    }
    const supplier = state.suppliers.find((s) => s.id === item.supplierId);
    return `
      <button data-open-runway-detail="${item.id}" data-runway-row
        data-name="${escapeHtml((item.name || '').toLowerCase())}"
        data-code="${escapeHtml((item.itemCode || '').toLowerCase())}"
        data-supplier="${escapeHtml((supplier ? supplier.name : '').toLowerCase())}"
        class="card" style="text-align:left;width:100%;padding:12px;">
        <div class="row" style="gap:10px;">
          <div class="flex1" style="min-width:0;">
            <div class="text-sm truncate" style="font-weight:500;color:var(--ink);">${escapeHtml(item.name)}</div>
            <div class="text-xs truncate muted">${detail}</div>
          </div>
          <span class="tag shrink0" style="background:${meta.bg};color:${meta.text};font-weight:600;">${meta.label}</span>
        </div>
        <div style="margin-top:9px;">${renderCoverageBar(status.sim, { height: 11 })}</div>
      </button>`;
  }).join('');

  // One shared month ruler under the stack — every bar uses the same 12-month
  // scale, so a gap in August sits at the same x-position on every row.
  const scaleSim = rowsData.length ? rowsData[0].status.sim : null;

  return `
    <div>
      <input type="search" id="runwaySearch" placeholder="Search item name or code…" value="${escapeHtml(state.runwaySearch)}" class="mb2">
      <div class="row wrap" style="gap:12px;margin-bottom:10px;">
        <span class="text-xs row" style="gap:4px;align-items:center;"><span style="width:10px;height:10px;border-radius:2px;background:var(--forest);opacity:.85;display:inline-block;"></span> Covered</span>
        <span class="text-xs row" style="gap:4px;align-items:center;"><span style="width:10px;height:10px;border-radius:2px;background:var(--amber-strong);display:inline-block;"></span> Rent accruing</span>
        <span class="text-xs row" style="gap:4px;align-items:center;"><span style="width:10px;height:10px;border-radius:2px;background:#C0503A;display:inline-block;"></span> No stock</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;">${rows}</div>
      <p id="runwayNoMatches" class="text-sm muted hidden" style="padding:16px 0;text-align:center;">No Key SKUs match that search.</p>
      ${scaleSim ? `<div style="margin-top:2px;padding:0 12px;">${renderCoverageBar(scaleSim, { height: 0, showMonths: true })}</div>` : ''}
      <p class="text-xs faint" style="margin-top:10px;">Bars span the next 5 months on a shared scale — a gap in August sits in the same place on every row. Tap an item for the dated breakdown.</p>
    </div>`;
}

// Fast show/hide filter (same approach as the Stock tab) — no re-render, so it
// stays responsive even with the coverage bars drawn.
function filterRunwayRows() {
  const q = state.runwaySearch.trim().toLowerCase();
  let anyVisible = false;
  document.querySelectorAll('[data-runway-row]').forEach((el) => {
    const match = !q || el.dataset.name.includes(q) || el.dataset.code.includes(q) || el.dataset.supplier.includes(q);
    el.classList.toggle('hidden', !match);
    if (match) anyVisible = true;
  });
  const noMatches = document.getElementById('runwayNoMatches');
  if (noMatches) noMatches.classList.toggle('hidden', anyVisible || !q);
}

/* ---- Runway detail: a dated timeline, not a chart.
   Contracts can be booked months out (loading Sept, arriving Nov, consumed
   into Dec), which a squashed 45-day curve on a phone could never show. Dates
   and sentences handle any horizon and answer the only two questions that
   matter: when do I run dry (and must I spot-buy), and will this batch outstay
   its rent-free window. ---- */
function renderRunwayDetailModal(m) {
  const item = state.items.find((i) => i.id === m.itemId);
  if (!item) return modalShell('Item not found', '<p class="text-sm muted">This item may have been deleted.</p>');

  const sim = simulateItemRunway(item, state.shipments);
  const { rows } = sim;
  const outages = stockoutRanges(rows);
  const rentExposures = rentExposuresForItem(item, state.shipments, sim);
  const lifecycle = batchLifecycle(sim);
  const burn = effectiveBurn(item);
  const unitStr = item.unit ? ' ' + escapeHtml(item.unit) : '';

  const atWarehouse = rows.length ? rows[0].balance : 0;
  const inTransitNow = rows.length ? (rows[0].inTransit || 0) : 0;
  const lastDay = rows.length ? rows[rows.length - 1].day : 0;
  const firstOut = outages.length ? outages[0][0] : null;
  const nearOutages = outages.filter(([s]) => s <= ALERT_WINDOW_DAYS);

  const burnLabel = burn ? `${Math.round(burn * 10) / 10}/day` : 'not set';
  const runsOutLabel = !burn ? 'set a burn rate' : firstOut != null ? roughDateLabel(firstOut) : 'past 5 months';

  /* --- Headline: the one-line answer --- */
  let headline;
  if (!burn) {
    headline = `<div class="text-sm">Add a daily burn rate (or send some orders) to project this item.</div>`;
  } else if (firstOut == null) {
    headline = `<div class="text-sm">Covered for the next 5 months at ${burnLabel}.</div>`;
  } else {
    headline = `<div class="text-sm">Stock runs out <strong>${roughDateLabel(firstOut)}</strong> at ${burnLabel}.</div>`;
  }

  /* --- Gaps: stretches with nothing to sell. The spot-buy prompt. --- */
  const gapAlerts = nearOutages.map(([s, e]) => {
    const openEnded = e >= lastDay;
    const span = e - s + 1;
    return `
      <div class="row" style="gap:8px;align-items:flex-start;background:var(--red-bg);border-radius:8px;padding:10px 12px;">
        ${icon('alert', 16, 'var(--red-text)')}
        <span class="text-sm">${openEnded
          ? `<strong>Nothing booked after ${roughDateLabel(s)}</strong> — no shipment covers the rest of the year. Spot buy, or book a contract.`
          : `<strong>Gap: ${roughDateLabel(s)} → ${roughDateLabel(e)}</strong> (~${span} day${span === 1 ? '' : 's'} with no stock) — spot buy needed to bridge it.`}</span>
      </div>`;
  }).join('');

  /* --- Rent: burning too slow, money starts leaking. --- */
  const rentAlerts = rentExposures.map((x) => `
    <div class="row" style="gap:8px;align-items:flex-start;background:var(--amber-bg);border-radius:8px;padding:10px 12px;">
      ${icon('clock', 16, 'var(--amber-strong)')}
      <span class="text-sm">${x.past
        ? `<strong>~${x.qtyAtDeadline}${unitStr} paying rent now</strong> — rent-free ended ${formatDateLabel(x.shipment.rentFreeDeadline)}. Move it out or burn it down.`
        : `<strong>~${x.qtyAtDeadline}${unitStr} still here when rent-free ends</strong> (${roughDateLabel(x.day)}) — ${escapeHtml(x.shipment.header || 'this batch')} won't burn down in time.`}</span>
    </div>`).join('');

  const alerts = (gapAlerts + rentAlerts) || `<p class="text-sm muted">No gaps in the next ${ALERT_WINDOW_DAYS} days, no rent risk. The bar above shows all 5 months.</p>`;

  /* --- The timeline: each batch as a dated entry --- */
  const timeline = lifecycle
    .filter((b) => b.shipment)
    .sort((a, b) => a.arriveDay - b.arriveDay)
    .map((b) => {
      const s = b.shipment;
      const supplier = state.suppliers.find((sup) => sup.id === s.supplierId);
      const landed = s.received;
      const lastsUntil = b.emptyDay != null ? roughDateLabel(b.emptyDay) : 'past 5 months';
      const rentEx = rentExposures.find((x) => x.shipment.id === s.id);
      // Only claim "clears in time" when we've actually checked it. A deadline
      // past the 5-month window can't be verified, so say so rather than tick it.
      const rentDeadlineDay = s.rentFreeDeadline ? daysFromToday(s.rentFreeDeadline) : null;
      const beyondView = rentDeadlineDay != null && rentDeadlineDay > lastDay;
      let rentLine = '';
      if (s.rentFreeDeadline) {
        if (rentEx) {
          rentLine = `Rent-free until ${formatDateLabel(s.rentFreeDeadline)} — <span style="color:var(--amber-strong);font-weight:600;">~${rentEx.qtyAtDeadline}${unitStr} still here by then</span>`;
        } else if (beyondView) {
          rentLine = `Rent-free until ${formatDateLabel(s.rentFreeDeadline)} — <span class="faint">beyond the 5-month view</span>`;
        } else {
          rentLine = `Rent-free until ${formatDateLabel(s.rentFreeDeadline)} — clears in time ✓`;
        }
      }

      return `
      <div class="card" style="padding:12px;">
        <div class="row" style="gap:8px;">
          <button data-edit-shipment="${s.id}" class="flex1" style="text-align:left;min-width:0;">
            <div class="text-sm truncate" style="font-weight:600;">${s.header ? escapeHtml(s.header) : (supplier ? escapeHtml(supplier.name) : 'Shipment')}</div>
            <div class="text-xs muted truncate">${b.qty}${unitStr} left of ${s.quantity}${s.askingPrice ? ` · $${s.askingPrice}` : ''}${supplier && s.header ? ' · ' + escapeHtml(supplier.name) : ''}</div>
          </button>
          <button data-toggle-received="${s.id}" class="btn-sm shrink0" style="background:${landed ? 'var(--green)' : 'var(--tint)'};color:${landed ? 'var(--forest)' : '#3B7EA1'};">${landed ? 'Landed' : 'In transit'}</button>
        </div>
        <div class="text-xs" style="margin-top:8px;line-height:1.7;color:var(--muted);">
          ${landed
            ? `In the warehouse now · lasts until <strong style="color:var(--ink);">${lastsUntil}</strong>`
            : `Arrives <strong style="color:var(--ink);">${roughDateLabel(b.arriveDay)}</strong> · lasts until <strong style="color:var(--ink);">${lastsUntil}</strong>`}
          ${rentLine ? `<br>${rentLine}` : ''}
          ${s.notes ? `<br><span class="faint">${escapeHtml(s.notes)}</span>` : ''}
        </div>
      </div>`;
    }).join('');

  const finished = state.shipments.filter((s) => s.itemId === item.id && shipmentRemaining(s) <= 0);
  const finishedRows = finished.map((s) => `
    <div class="card row" style="padding:10px 12px;opacity:.5;gap:8px;">
      <button data-edit-shipment="${s.id}" class="flex1" style="text-align:left;min-width:0;">
        <div class="text-sm truncate">${s.header ? escapeHtml(s.header) : 'Shipment'} · ${s.quantity}${unitStr} <span class="tag">Finished</span></div>
      </button>
    </div>`).join('');

  const body = `
    <div class="row wrap gap2 mb2" style="align-items:flex-end;">
      <div>
        <div class="text-xs muted mb1">Other stock</div>
        <input type="number" inputmode="decimal" data-stock-available-for="${item.id}" value="${item.stockAvailable ?? 0}" class="font-mono"
          style="width:66px;padding:6px 8px;border-radius:8px;border:1.5px solid var(--forest);background:#F2F7F5;color:var(--forest);font-weight:700;font-size:15px;">
      </div>
      <div><div class="text-xs muted">At warehouse</div><div class="font-mono text-sm" style="font-weight:700;">${atWarehouse}</div></div>
      ${inTransitNow > 0 ? `<div><div class="text-xs muted">In transit</div><div class="font-mono text-sm" style="font-weight:700;color:#3B7EA1;">${inTransitNow}</div></div>` : ''}
      <div><div class="text-xs muted">Runs out</div><div class="text-sm" style="font-weight:700;">${runsOutLabel}</div></div>
    </div>

    <div class="card" style="padding:12px;margin-bottom:14px;background:var(--tint);">${headline}</div>

    <div style="margin-bottom:4px;">${renderCoverageBar(sim, { height: 16, showMonths: true })}</div>
    <div class="row wrap" style="gap:12px;margin-bottom:16px;">
      <span class="text-xs row" style="gap:4px;align-items:center;"><span style="width:9px;height:9px;border-radius:2px;background:var(--forest);opacity:.85;display:inline-block;"></span> Covered</span>
      <span class="text-xs row" style="gap:4px;align-items:center;"><span style="width:9px;height:9px;border-radius:2px;background:var(--amber-strong);display:inline-block;"></span> Rent accruing</span>
      <span class="text-xs row" style="gap:4px;align-items:center;"><span style="width:9px;height:9px;border-radius:2px;background:#C0503A;display:inline-block;"></span> No stock</span>
    </div>

    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:18px;">${alerts}</div>

    <div class="section-label">Shipments</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px;">${timeline || '<p class="text-sm muted">No shipments logged yet.</p>'}</div>
    ${finishedRows ? `<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px;">${finishedRows}</div>` : ''}
    <button data-add-shipment="${item.id}" class="btn btn-soft" style="display:flex;align-items:center;gap:6px;">${icon('plus', 16, 'var(--forest)')} Add shipment</button>
    <p class="hint" style="margin-top:10px;">Dates further than two weeks out are rough on purpose — they come from an average burn rate, so treating them as exact would be false precision.</p>`;

  return modalShell(item.name, body);
}

function saveShipment(data) {

  else updateShipments([...state.shipments, { ...data, id: uid() }]);

}

/* ============================================================
   DRAWDOWN ENGINE — links the Orders flow to Key SKU shipments.

   When an order is SENT: for each line whose item is a Key SKU, the qty is
   deducted from that supplier's LANDED shipments of that item (earliest
   rent-free deadline first — matches how cold stores release stock and
   minimizes rent). What was deducted is recorded on the order itself, so
   UNDO can re-credit exactly. Revised orders deliberately do NOT auto-adjust
   (v1 scope) — the "drawn down" field on the shipment edit form is the
   manual escape hatch for those rarer cases.
   ============================================================ */
function shipmentRemaining(s) {
  return Math.max(0, (Number(s.quantity) || 0) - (Number(s.drawnDown) || 0));
}

function applyDrawdownsForOrder(order) {
  const drawdowns = []; // { shipmentId, qty }
  let shipments = state.shipments.map((s) => ({ ...s }));
  order.items.forEach((line) => {
    const item = state.items.find((i) => i.id === line.itemId);
    if (!item || !item.keySku) return;
    let toDraw = Number(line.qty) || 0;
    if (toDraw <= 0) return;
    const candidates = shipments
      .filter((s) => s.itemId === item.id && s.received && s.supplierId === order.supplierId && shipmentRemaining(s) > 0)
      .sort((a, b) => (a.rentFreeDeadline || '9999-99-99').localeCompare(b.rentFreeDeadline || '9999-99-99'));
    for (const s of candidates) {
      if (toDraw <= 0) break;
      const take = Math.min(shipmentRemaining(s), toDraw);
      s.drawnDown = (Number(s.drawnDown) || 0) + take;
      if (shipmentRemaining(s) <= 0 && !s.finishedAt) s.finishedAt = todayStr();
      drawdowns.push({ shipmentId: s.id, qty: take });
      toDraw -= take;
    }
    // If toDraw is still > 0 here, the rest is a spot purchase / no held stock —
    // nothing further to deduct, which is correct.
  });
  if (drawdowns.length) updateShipments(shipments);
  return drawdowns;
}

function revertDrawdownsForOrder(order) {
  if (!order.drawdowns || !order.drawdowns.length) return;
  updateShipments(state.shipments.map((s) => {
    const credit = order.drawdowns
      .filter((d) => d.shipmentId === s.id)
      .reduce((sum, d) => sum + (Number(d.qty) || 0), 0);
    if (!credit) return s;
    const next = { ...s, drawnDown: Math.max(0, (Number(s.drawnDown) || 0) - credit) };
    if (shipmentRemaining(next) > 0) delete next.finishedAt;
    return next;
  }));
}

/* ---- Auto burn rate: average daily order quantity over the last 60 days.
   Falls back to the item's manual dailyBurn when there's no order history. ---- */
const BURN_WINDOW_DAYS = 60;
function autoBurnRate(itemId) {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - BURN_WINDOW_DAYS);
  const cutoffStr = toLocalDateStr(cutoff);
  const total = state.orders.reduce((sum, o) => {
    const d = o.expectedDate || (o.placedAt ? toLocalDateStr(new Date(o.placedAt)) : '');
    if (!d || d < cutoffStr || d > todayStr()) return sum;
    const line = o.items.find((l) => l.itemId === itemId);
    return sum + (line ? (Number(line.qty) || 0) : 0);
  }, 0);
  return total > 0 ? total / BURN_WINDOW_DAYS : 0;
}

/* ---- Burn rate.
   Currently MANUAL ONLY — the figure you set on the item form.

   autoBurnRate() below is kept but deliberately unused. It divides total
   ordered by a fixed 60-day window, which is only meaningful once ~60 days of
   real order history exists. Before that it badly understates burn (one order
   of 10 today would read as 0.17/day) and, worse, would silently override the
   manual figure with a wrong-but-plausible number. Switch it on once there's
   genuine history — and make it divide by the days of history actually
   present, not a hardcoded 60. ---- */
function effectiveBurn(item) {
  return Number(item.dailyBurn) || 0;
}

/* ---- Data pruning: keeps localStorage lean so the app stays fast for years.
   Orders older than 90 days are removed (burn calc only needs 60); finished
   shipments are hidden immediately and fully deleted 7 days after finishing.
   Long-term history lives in your JSON backups, not on the phone. ---- */
const ORDER_RETENTION_DAYS = 90;
const FINISHED_SHIPMENT_RETENTION_DAYS = 7;
function pruneOldData() {
  const orderCutoff = new Date();
  orderCutoff.setDate(orderCutoff.getDate() - ORDER_RETENTION_DAYS);
  const orderCutoffStr = toLocalDateStr(orderCutoff);
  const keptOrders = state.orders.filter((o) => {
    const d = o.expectedDate || (o.placedAt ? toLocalDateStr(new Date(o.placedAt)) : todayStr());
    return d >= orderCutoffStr;
  });
  if (keptOrders.length !== state.orders.length) updateOrders(keptOrders);

  const shipCutoff = new Date();
  shipCutoff.setDate(shipCutoff.getDate() - FINISHED_SHIPMENT_RETENTION_DAYS);
  const shipCutoffStr = toLocalDateStr(shipCutoff);
  const keptShipments = state.shipments.filter((s) => !s.finishedAt || s.finishedAt >= shipCutoffStr);
  if (keptShipments.length !== state.shipments.length) updateShipments(keptShipments);
}


/* ============================================================
   SUPPLIERS TAB (+ collapsible Warehouses subsection, driver messages)
   ============================================================ */
function renderSuppliersTab() {

  const supplierRows = state.suppliers.map((s) => {

              <div class="text-xs" style="color:${qty > 0 ? 'var(--amber-strong)' : 'var(--faint)'};">${qty} to pick up (${formatDateLabel(state.orderDate)})</div>

/* ============================================================
   MODAL SYSTEM
   ============================================================ */
function openModal(modal) {
  state.modal = modal;
  renderModal();
}
function closeModal() {
  const returnTo = state.modal && state.modal.returnTo;
  state.modal = null;
  if (returnTo) { openModal(returnTo); return; }
  document.getElementById('modalRoot').innerHTML = '';
  renderTab(); // underlying data likely changed
}
function renderModal() {
  const root = document.getElementById('modalRoot');
  if (!state.modal) { root.innerHTML = ''; return; }
  const m = state.modal;
  if (m.type === 'item') root.innerHTML = renderItemForm(m);
  else if (m.type === 'supplier') root.innerHTML = renderSupplierForm(m);
  else if (m.type === 'warehouse') root.innerHTML = renderWarehouseForm(m);
  else if (m.type === 'driver') root.innerHTML = renderDriverMessageModal();
  else if (m.type === 'shipment') root.innerHTML = renderShipmentForm(m);
  else if (m.type === 'runwayDetail') root.innerHTML = renderRunwayDetailModal(m);
  wireModalEvents();
}

function modalShell(title, bodyHtml) {
  return `
    <div class="modal-page" id="modalPage">
      <div class="modal-head">
        <h2>${escapeHtml(title)}</h2>
        <button data-close-modal class="modal-close">${icon('x', 18, 'var(--muted)')}</button>
      </div>
      <div class="modal-body">${bodyHtml}</div>
    </div>`;
}

function fieldHtml(label, innerHtml) {
  return `<div class="field"><label>${escapeHtml(label)}</label>${innerHtml}</div>`;
}
