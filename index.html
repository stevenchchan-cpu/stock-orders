<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Stock & Orders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --forest:#18443D; --forest-light:#9CC4BC; --cream:#FAF8F2; --card:#FFFFFF;
    --border:#E4DDD0; --ink:#20241F; --ink-soft:#3A362E; --muted:#6B6457; --faint:#A39C8C;
    --tint:#F4F0E8; --amber-bg:#F6E3D3; --amber-border:#E8B98A; --amber-text:#7A3E0E;
    --amber-strong:#C2710A; --red-bg:#F6E3D3; --red-text:#B3402A; --green:#DCEAE6; --whatsapp:#25D366;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; background:var(--cream); color:var(--ink); font-family:'Inter',-apple-system,sans-serif; }
  body { padding-bottom:84px; min-height:100vh; }
  h1,h2 { margin:0; }
  .font-display { font-family:'Space Grotesk',sans-serif; }
  .font-mono { font-family:'JetBrains Mono',monospace; }
  button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; -webkit-appearance:none; }
  input,select,textarea { font-family:inherit; font-size:15px; -webkit-appearance:none; appearance:none; }
  a { color:inherit; }
  .hidden { display:none !important; }

  .header { background:var(--forest); padding:20px 20px 14px; position:sticky; top:0; z-index:10; }
  .header .eyebrow { font-size:11px; letter-spacing:.05em; text-transform:uppercase; color:var(--forest-light); }
  .header h1 { font-size:22px; font-weight:700; color:var(--cream); }

  .main { padding:16px; max-width:640px; margin:0 auto; }
  .section { margin-bottom:24px; }
  .section-label { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.03em; color:var(--muted); margin-bottom:8px; }

  .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:12px; }
  .card + .card { margin-top:8px; }

  .btn { display:flex; align-items:center; justify-content:center; gap:6px; padding:12px; border-radius:12px; font-weight:500; font-size:14px; width:100%; }
  .btn-primary { background:var(--forest); color:var(--cream); }
  .btn-primary[disabled] { background:var(--border); color:var(--faint); }
  .btn-ghost { background:transparent; color:var(--muted); border:1px dashed #C9C2B2; }
  .btn-soft { background:var(--green); color:var(--forest); border:1px solid #B7CFC9; }
  .btn-sm { padding:6px 12px; border-radius:999px; font-size:12px; font-weight:500; width:auto; }
  .btn-whatsapp { background:var(--whatsapp); color:#fff; }
  .btn-cancel { background:var(--tint); color:var(--muted); }

  input[type=text],input[type=number],input[type=tel],input[type=date],input[type=search],select {
    width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--border); background:var(--cream); color:var(--ink);
  }
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:12px; font-weight:500; color:var(--muted); margin-bottom:4px; }
  .hint { font-size:12px; color:var(--faint); margin-top:-6px; margin-bottom:12px; }
  .warn-hint { font-size:12px; color:var(--amber-strong); margin-bottom:8px; }

  .chip { display:inline-flex; align-items:center; gap:4px; padding:6px 12px; border-radius:999px; font-size:12px; font-weight:500; }
  .tag { font-size:10px; padding:2px 6px; border-radius:999px; background:var(--tint); color:var(--muted); }

  .segmented { display:inline-flex; border:1px solid var(--border); border-radius:999px; overflow:hidden; }
  .segmented button { padding:5px 10px; font-size:12px; font-weight:500; color:var(--muted); }
  .segmented button.active { background:var(--forest); color:#fff; }

  .empty { text-align:center; padding:48px 16px; }
  .empty .title { font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:16px; margin-bottom:4px; }
  .empty .body { font-size:14px; color:var(--muted); margin-bottom:16px; }

  .nav { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--border); display:flex; justify-content:space-around; padding:8px 8px calc(8px + env(safe-area-inset-bottom)); z-index:20; }
  .nav button { display:flex; flex-direction:column; align-items:center; gap:2px; padding:6px 16px; border-radius:12px; position:relative; }
  .nav button svg { width:22px; height:22px; stroke:var(--faint); }
  .nav button span { font-size:11px; font-weight:500; color:var(--faint); }
  .nav button.active svg { stroke:var(--forest); }
  .nav button.active span { color:var(--forest); }
  .nav-badge { position:absolute; top:-2px; right:10px; background:var(--amber-strong); color:#fff; font-size:9px; font-weight:700; border-radius:999px; min-width:14px; height:14px; display:flex; align-items:center; justify-content:center; padding:0 3px; }

  .modal-page { position:fixed; inset:0; background:var(--cream); z-index:50; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .modal-head { position:sticky; top:0; display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:var(--cream); border-bottom:1px solid var(--border); z-index:2; }
  .modal-head h2 { font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:600; }
  .modal-close { background:var(--tint); border-radius:999px; padding:6px; }
  .modal-body { padding:20px; padding-bottom:40px; }

  .toast { position:fixed; left:16px; right:16px; top:16px; z-index:60; background:var(--ink); color:var(--cream); padding:12px 16px; border-radius:12px; font-size:14px; font-weight:500; box-shadow:0 8px 24px rgba(0,0,0,.2); }

  .row { display:flex; align-items:center; gap:8px; }
  .row-between { display:flex; align-items:center; justify-content:space-between; }
  .wrap { flex-wrap:wrap; }
  .gap2 { gap:8px; }
  .flex1 { flex:1; min-width:0; }
  .shrink0 { flex-shrink:0; }
  .mt2{margin-top:8px;} .mb2{margin-bottom:8px;} .mt1{margin-top:4px;} .mb1{margin-bottom:4px;}
  .truncate { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .text-xs{font-size:12px;} .text-sm{font-size:14px;}
  .muted{color:var(--muted);} .faint{color:var(--faint);}
  .qty-input { width:56px; padding:8px 4px; border-radius:9px; border:1.5px solid var(--forest); background:#F2F7F5; color:var(--forest); font-weight:700; font-size:16px; text-align:center; }
  .stepper-btn { width:26px; height:26px; border-radius:999px; display:flex; align-items:center; justify-content:center; }
  .index-badge { font-family:'JetBrains Mono',monospace; font-size:12px; width:20px; text-align:center; color:var(--faint); flex-shrink:0; }

  svg { display:block; }
  ::placeholder { color:var(--faint); }
  [data-hide-when-empty]:empty { display:none; }
</style>
</head>

/* ============================================================
   PORTED BUSINESS LOGIC (dates, messages, real data) — unchanged from the app version
   ============================================================ */
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

const WEEKDAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

function parForDate(item, date) {
  const day = date.getDay();
  if (item.parByDay && item.parByDay[day] != null && item.parByDay[day] !== '') {
    return Number(item.parByDay[day]);
  }
  return item.par;
}

function toLocalDateStr(d) {
  // Local calendar date (YYYY-MM-DD) based on the device's own clock/timezone,
  // not UTC — toISOString() would shift the date near midnight in many timezones.
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function todayStr() {
  return toLocalDateStr(new Date());
}

function tomorrowStr() {
  const d = new Date();
  d.setDate(d.getDate() + 1);
  return toLocalDateStr(d);
}

function isStillIncoming(order) {
  // Assume delivered once we're past the expected date — no manual "received" step needed.
  const expected = order.expectedDate || (order.placedAt ? toLocalDateStr(new Date(order.placedAt)) : todayStr());
  return expected >= todayStr();
}

function pendingQtyForItem(itemId, orders, opts = {}) {
  const { onDate, throughDate, includeWarehouse = true } = opts;
  return orders
    .filter(isStillIncoming)
    .filter((o) => {
      const d = o.expectedDate || todayStr();
      if (throughDate) return d <= throughDate;
      if (onDate) return d === onDate;
      return true;
    })
    .reduce((sum, o) => {
      const line = o.items.find((i) => i.itemId === itemId);
      if (!line) return sum;
      if (!includeWarehouse && line.toOwnWarehouse) return sum;
      return sum + line.qty;
    }, 0);
}

function defaultOrderDate() {
  // After ~1pm, default to tomorrow to match typical supplier cutoffs — but this is just a
  // starting point; the date picker lets you account for holidays, closures, etc.
  return new Date().getHours() < 13 ? todayStr() : tomorrowStr();
}

function formatDateLabel(dateStr) {
  if (!dateStr) return '';
  if (dateStr === todayStr()) return 'Today';
  if (dateStr === tomorrowStr()) return 'Tomorrow';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString(undefined, { weekday: 'short', day: 'numeric', month: 'short' });
}

function effectivePickupWarehouseId(item, supplier) {
  return item?.defaultWarehouseId || supplier?.defaultWarehouseId || '';
}

function gaugeLevel(item, orders, date = new Date()) {
  // 0..1 fill, accounting for stock + incoming — excludes stock earmarked for your own
  // warehouse, since that won't land on the shop shelf this par level is meant to track.
  const par = parForDate(item, date);
  const pending = pendingQtyForItem(item.id, orders, { includeWarehouse: false });
  const total = item.stock + pending;
  if (par <= 0) return 1;
  return Math.max(0, Math.min(1, total / par));
}

const WEEKDAY_CN = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];

const INTERNAL_PERSON_WHATSAPP = '85268240691'; // gets a copy of every normal supplier order, for record-keeping

function chineseDayWord(dateStr, isAdditional, prefix) {
  let word;
  if (!dateStr || dateStr === todayStr()) word = isAdditional ? '今日加多' : '今日';
  else if (dateStr === tomorrowStr()) word = isAdditional ? '聽日加多' : '聽日';
  else {
    const d = new Date(dateStr + 'T00:00:00');
    const dateLabel = `${WEEKDAY_CN[d.getDay()]}${d.getMonth() + 1}月${d.getDate()}日`;
    word = isAdditional ? `${dateLabel}加多` : dateLabel;
  }
  return prefix ? `${prefix} ${word}` : word;
}

function buildMessage(supplierName, lines, dateStr, isAdditional, prefix) {
  const dayWord = chineseDayWord(dateStr, isAdditional, prefix);
  const formatLines = (arr) => arr.map((l) => `${l.qty}${l.unit || ''}${l.name}`).join('\n');
  const shopLines = lines.filter((l) => !l.toOwnWarehouse);
  const warehouseLines = lines.filter((l) => l.toOwnWarehouse);

  if (warehouseLines.length === 0) {
    // everything is going to the shop — no need to label it
    return `${dayWord}\n${formatLines(shopLines)}`;
  }
  if (shopLines.length === 0) {
    // everything is going to your own warehouse
    return `${dayWord}\n倉:\n${formatLines(warehouseLines)}`;
  }
  // mixed order — keep the two destinations clearly separated so the driver isn't guessing
  return `${dayWord}\n舖:\n${formatLines(shopLines)}\n\n倉:\n${formatLines(warehouseLines)}`;
}

async function sendOrShareMessage(phone, message, windowName) {
  // Always open-ended — no phone number is ever plugged in. WhatsApp opens with the
  // message pre-filled and lets the user pick one or more contacts or a group themselves.
  window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, windowName || `wa_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`);
  return 'opened';
}

function generateRealData() {
  const INTERNAL_ACCOUNT_SUPPLIERS = ['金發', '沙田', '光一', '其士'];

  const suppliers = REAL_SUPPLIER_NAMES.map((name) => ({
    id: uid(),
    name,
    // 沙田/光一/其士 route to the internal record-keeping contact; 金發 (your own warehouse)
    // is left blank for you to fill in its manager's number — until then it uses WhatsApp's picker.
    whatsapp: (INTERNAL_ACCOUNT_SUPPLIERS.includes(name) && name !== '金發') ? INTERNAL_PERSON_WHATSAPP : '',
    defaultWarehouseId: '', // filled in below once warehouse ids exist
    isInternalAccount: INTERNAL_ACCOUNT_SUPPLIERS.includes(name),
  }));
  const supplierByName = Object.fromEntries(suppliers.map((s) => [s.name, s]));

  const warehouses = REAL_WAREHOUSE_NAMES.map((name) => ({ id: uid(), name }));
  const warehouseByName = Object.fromEntries(warehouses.map((w) => [w.name, w]));

  suppliers.forEach((s) => {
    const whName = REAL_SUPPLIER_DEFAULT_WAREHOUSE[s.name];
    s.defaultWarehouseId = whName ? (warehouseByName[whName]?.id || '') : '';
  });

  const items = REAL_ITEMS_RAW.map((raw) => {
    const supplier = supplierByName[raw.supplier];
    const item = {
      id: uid(),
      name: raw.name,
      itemCode: raw.itemCode || '',
      supplierId: supplier ? supplier.id : '',
      unit: '件',
      par: 0,
      stock: 0,
      tags: [],
      parByDay: {},
    };
    if (raw.warehouseOverride) {
      item.defaultWarehouseId = warehouseByName[raw.warehouseOverride]?.id || '';
    }
    return item;
  });

  return { suppliers, items, orders: [], warehouses };
}


/* ============================================================
   STORAGE — localStorage, with debounced writes so rapid state changes
   (typing a quantity, dragging, etc.) don't hammer the disk on every keystroke
   ============================================================ */
const STORAGE_PREFIX = 'stockOrderApp:';
const pendingWrites = {};
const writeTimers = {};

function loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(STORAGE_PREFIX + key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    console.error('load failed', key, e);
    return fallback;
  }
}

function saveJSONNow(key, value) {
  try {
    localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(value));
  } catch (e) {
    console.error('save failed', key, e);
  }
}

// Debounced save: coalesces bursts of writes to the same key into one disk write ~200ms later.
function saveJSONDebounced(key, value) {
  pendingWrites[key] = value;
  clearTimeout(writeTimers[key]);
  writeTimers[key] = setTimeout(() => {
    saveJSONNow(key, pendingWrites[key]);
    delete pendingWrites[key];
  }, 200);
}

function flushAllWrites() {
  Object.keys(writeTimers).forEach((key) => {
    clearTimeout(writeTimers[key]);
    if (key in pendingWrites) {
      saveJSONNow(key, pendingWrites[key]);
      delete pendingWrites[key];
    }
  });
}
window.addEventListener('beforeunload', flushAllWrites);
window.addEventListener('pagehide', flushAllWrites);

/* ============================================================
   STATE — a single global object. Renders are targeted (see render* functions)
   rather than one big re-render, to stay fast with 150-250 items.
   ============================================================ */
const state = {
  suppliers: loadJSON('suppliers', []),
  items: loadJSON('items', []),
  cart: loadJSON('cart', []),
  orders: loadJSON('orders', []),
  warehouses: loadJSON('warehouses', []),
  tab: 'today',
  orderDate: defaultOrderDate(),
  draftQty: {},              // itemId -> string, not persisted (session-only, like the app version)
  dateOverrides: {},         // supplierId -> ISO date string (Cart tab per-supplier override)
  search: '',
  filterField: 'supplier',
  filterValue: '',
  onlyOrderedForDate: false,
  showWarehouses: false,
  showSuppliers: false,
  selectedWarehousesForDriverMsg: [],
  stockSearch: '',
  incomingFilterDate: '',
  incomingCumulative: false,
  modal: null,               // { type: 'item'|'supplier'|'warehouse', mode:'new'|'edit', data, insertAfterId }
  editingPickupFor: null,    // cart line id
  editingSupplierFor: null,  // cart line id
  scrollPositions: {},       // tab -> last scroll position (session-only, so returning to a tab picks up where you left off)
};

function persist(key) {
  saveJSONDebounced(key, state[key]);
}


/* ============================================================
   TOAST
   ============================================================ */
let toastTimer = null;
function showToast(msg) {
  const root = document.getElementById('toastRoot');
  root.innerHTML = `<div class="toast">${escapeHtml(msg)}</div>`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { root.innerHTML = ''; }, 3500);
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str == null ? '' : String(str);
  return d.innerHTML;
}

/* ============================================================
   DATA MUTATIONS — each updates state, persists (debounced), and re-renders
   only what's needed rather than the whole app.
   ============================================================ */
function updateSuppliers(next) { state.suppliers = next; persist('suppliers'); }
function updateItems(next) { state.items = next; persist('items'); }
function updateCart(next) { state.cart = next; persist('cart'); }
function updateOrders(next) { state.orders = next; persist('orders'); }
function updateWarehouses(next) { state.warehouses = next; persist('warehouses'); }

function effectiveSupplierId(cartLine, item) {
  return cartLine.supplierOverride || (item && item.supplierId);
}

function addToCart(itemId, qty) {
  if (!qty || qty <= 0) return;
  const item = state.items.find((i) => i.id === itemId);
  const supplier = state.suppliers.find((s) => s.id === (item && item.supplierId));
  const pickupWarehouseId = effectivePickupWarehouseId(item, supplier);
  updateCart([...state.cart, { id: uid(), itemId, qty, ...(pickupWarehouseId ? { pickupWarehouseId } : {}) }]);
  state.draftQty[itemId] = '';
}

function addAllToCart() {
  const entries = Object.entries(state.draftQty).filter(([, v]) => parseFloat(v) > 0);
  if (entries.length === 0) return;
  const newLines = entries.map(([itemId, v]) => {
    const qty = parseFloat(v);
    const item = state.items.find((i) => i.id === itemId);
    const supplier = state.suppliers.find((s) => s.id === (item && item.supplierId));
    const pickupWarehouseId = effectivePickupWarehouseId(item, supplier);
    return { id: uid(), itemId, qty, ...(pickupWarehouseId ? { pickupWarehouseId } : {}) };
  });
  updateCart([...state.cart, ...newLines]);
  entries.forEach(([itemId]) => { state.draftQty[itemId] = ''; });
}

function setCartQty(lineId, qty) {
  if (qty <= 0) {
    updateCart(state.cart.filter((c) => c.id !== lineId));
  } else {
    updateCart(state.cart.map((c) => (c.id === lineId ? { ...c, qty } : c)));
  }
}

function setCartPickupWarehouse(lineId, warehouseId) {
  updateCart(state.cart.map((c) => (c.id === lineId ? { ...c, pickupWarehouseId: warehouseId } : c)));
}

function setCartSupplierOverride(lineId, supplierId) {
  updateCart(state.cart.map((c) => {
    if (c.id !== lineId) return c;
    const item = state.items.find((i) => i.id === c.itemId);
    if (!item || supplierId === item.supplierId) {
      const { supplierOverride, ...rest } = c;
      return rest;
    }
    return { ...c, supplierOverride: supplierId };
  }));
}

function toggleCartWarehouse(lineId) {
  updateCart(state.cart.map((c) => (c.id === lineId ? { ...c, toOwnWarehouse: !c.toOwnWarehouse } : c)));
}

function computeCartGroups() {
  return state.suppliers
    .map((s) => {
      const lines = state.cart
        .map((c) => ({ ...c, item: state.items.find((i) => i.id === c.itemId) }))
        .filter((l) => l.item && effectiveSupplierId(l, l.item) === s.id);
      return { supplier: s, lines };
    })
    .filter((g) => g.lines.length > 0);
}

function computeIncomingOrders() {
  return state.orders.filter(isStillIncoming).sort((a, b) => a.placedAt.localeCompare(b.placedAt));
}

function sendSupplierOrder(group, dateStr) {
  const { supplier, lines } = group;
  const expectedDate = dateStr || todayStr();
  const isAdditional = state.orders.some((o) => o.supplierId === supplier.id && o.expectedDate === expectedDate);
  const prefix = supplier.isInternalAccount ? supplier.name : undefined;
  const message = buildMessage(
    supplier.name,
    lines.map((l) => ({ name: l.item.name, qty: l.qty, unit: l.item.unit, toOwnWarehouse: l.toOwnWarehouse })),
    expectedDate,
    isAdditional,
    prefix
  );
  sendOrShareMessage(supplier.whatsapp, message, 'wa_supplier').then(() => {
    showToast(`Opened WhatsApp for ${supplier.name} — pick who to send it to.`);
  });

  const newOrder = {
    id: uid(),
    supplierId: supplier.id,
    supplierName: supplier.name,
    items: lines.map((l) => ({
      itemId: l.itemId,
      qty: l.qty,
      name: l.item.name,
      unit: l.item.unit,
      toOwnWarehouse: l.toOwnWarehouse || false,
      pickupWarehouseId: l.pickupWarehouseId || '',
    })),
    placedAt: new Date().toISOString(),
    expectedDate,
    status: 'pending',
  };
  updateOrders([...state.orders, newOrder]);
  updateCart(state.cart.filter((c) => !lines.some((l) => l.id === c.id)));
  renderTab();
}

function cancelOrder(order) {
  updateOrders(state.orders.filter((o) => o.id !== order.id));
  const restoredLines = order.items.map((line) => {
    const item = state.items.find((i) => i.id === line.itemId);
    const override = item && item.supplierId !== order.supplierId ? order.supplierId : undefined;
    return {
      id: uid(),
      itemId: line.itemId,
      qty: line.qty,
      ...(override ? { supplierOverride: override } : {}),
      ...(line.toOwnWarehouse ? { toOwnWarehouse: true } : {}),
      ...(line.pickupWarehouseId ? { pickupWarehouseId: line.pickupWarehouseId } : {}),
    };
  });
  updateCart([...state.cart, ...restoredLines]);
  renderTab();
}

/* ---- suppliers / items / warehouses CRUD ---- */
function saveSupplier(data) {
  if (data.id) {
    updateSuppliers(state.suppliers.map((s) => (s.id === data.id ? data : s)));
  } else {
    updateSuppliers([...state.suppliers, { ...data, id: uid() }]);
  }
  closeModal();
}
function deleteSupplier(id) {
  updateSuppliers(state.suppliers.filter((s) => s.id !== id));
  closeModal();
}

function saveItem(data) {
  const { insertAfterId, ...rest } = data;
  if (rest.id) {
    updateItems(state.items.map((i) => (i.id === rest.id ? rest : i)));
  } else {
    const newItem = { ...rest, id: uid() };
    if (insertAfterId) {
      const idx = state.items.findIndex((i) => i.id === insertAfterId);
      const next = [...state.items];
      next.splice(idx + 1, 0, newItem);
      updateItems(next);
    } else {
      updateItems([...state.items, newItem]);
    }
  }
  closeModal();
}
function deleteItem(id) {
  updateItems(state.items.filter((i) => i.id !== id));
  closeModal();
}
function moveItem(id, direction) {
  const idx = state.items.findIndex((i) => i.id === id);
  const swapWith = direction === 'up' ? idx - 1 : idx + 1;
  if (idx === -1 || swapWith < 0 || swapWith >= state.items.length) return;
  const next = [...state.items];
  [next[idx], next[swapWith]] = [next[swapWith], next[idx]];
  updateItems(next);
  renderTab();
}

function saveWarehouse(data) {
  if (data.id) {
    updateWarehouses(state.warehouses.map((w) => (w.id === data.id ? data : w)));
  } else {
    updateWarehouses([...state.warehouses, { ...data, id: uid() }]);
  }
  closeModal();
}
function deleteWarehouse(id) {
  updateWarehouses(state.warehouses.filter((w) => w.id !== id));
  updateSuppliers(state.suppliers.map((s) => (s.defaultWarehouseId === id ? { ...s, defaultWarehouseId: '' } : s)));
  updateItems(state.items.map((i) => (i.defaultWarehouseId === id ? { ...i, defaultWarehouseId: '' } : i)));
  updateCart(state.cart.map((c) => {
    if (c.pickupWarehouseId !== id) return c;
    const { pickupWarehouseId, ...rest } = c;
    return rest;
  }));
  closeModal();
}

function loadRealData() {
  const data = generateRealData();
  updateSuppliers(data.suppliers);
  updateItems(data.items);
  updateCart([]);
  updateOrders(data.orders);
  updateWarehouses(data.warehouses);
  closeModal();
  renderTab();
}


/* ============================================================
   APP SHELL — header, bottom nav, top-level render dispatch
   ============================================================ */
const TABS = [
  { key: 'today', label: 'Orders', icon: 'clipboard', title: 'Orders' },
  { key: 'cart', label: 'Cart', icon: 'cart', title: 'Cart' },
  { key: 'stock', label: 'Stock', icon: 'package', title: 'Stock' },
  { key: 'suppliers', label: 'Suppliers', icon: 'users', title: 'Suppliers' },
];

function setTab(tab) {
  // Remember exactly where we were on the tab we're leaving...
  state.scrollPositions[state.tab] = window.scrollY;
  state.tab = tab;
  renderTab();
  renderNav();
  // ...and jump back to that spot if we've visited this tab before this session (else top, as before).
  const restoreY = state.scrollPositions[tab] || 0;
  requestAnimationFrame(() => window.scrollTo(0, restoreY));
}

function renderNav() {
  const nav = document.getElementById('bottomNav');
  nav.innerHTML = TABS.map((t) => {
    const active = state.tab === t.key ? 'active' : '';
    const badge = t.key === 'cart' && state.cart.length > 0
      ? `<span class="nav-badge">${state.cart.length > 99 ? '99+' : state.cart.length}</span>` : '';
    return `<button data-tab="${t.key}" class="${active}">
      <span style="position:relative;display:block;">${icon(t.icon, 22)}${badge}</span>
      <span>${t.label}</span>
    </button>`;
  }).join('');
  document.getElementById('pageTitle').textContent = TABS.find((t) => t.key === state.tab).title;
}
document.getElementById('bottomNav').addEventListener('click', (e) => {
  const btn = e.target.closest('button[data-tab]');
  if (btn) setTab(btn.dataset.tab);
});

function renderTab() {
  const main = document.getElementById('mainContent');
  document.getElementById('pageTitle').textContent = TABS.find((t) => t.key === state.tab).title;
  if (state.tab === 'today') { main.innerHTML = renderOrdersTab(); filterOrderListRows(); }
  else if (state.tab === 'cart') main.innerHTML = renderCartTab();
  else if (state.tab === 'stock') { main.innerHTML = renderStockTab(); filterStockRows(); }
  else if (state.tab === 'suppliers') main.innerHTML = renderSuppliersTab();
  renderNav(); // badge count may have changed
  wireTabEvents();
}


/* ============================================================
   ORDERS TAB
   ============================================================ */
const FILTER_FIELDS = [
  {
    key: 'supplier', label: 'Supplier',
    getOptions: (items, suppliers) => suppliers.map((s) => ({ value: s.id, label: s.name })),
    matches: (item, value) => item.supplierId === value,
  },
  {
    key: 'tag', label: 'Tag',
    getOptions: (items) => Array.from(new Set(items.flatMap((it) => it.tags || []))).sort().map((t) => ({ value: t, label: t })),
    matches: (item, value) => (item.tags || []).includes(value),
  },
];

function computeIncomingBreakdown(orders, orderDate) {
  const map = {};
  orders.forEach((o) => {
    if (!isStillIncoming(o)) return;
    const d = o.expectedDate || todayStr();
    o.items.forEach((line) => {
      if (line.toOwnWarehouse) return;
      if (!map[line.itemId]) map[line.itemId] = { cumulative: 0, exact: 0, future: 0 };
      if (d <= orderDate) map[line.itemId].cumulative += line.qty;
      if (d === orderDate) map[line.itemId].exact += line.qty;
      if (d > orderDate) map[line.itemId].future += line.qty;
    });
  });
  return map;
}

function renderOrdersTab() {
  if (state.suppliers.length === 0 || state.items.length === 0) {
    return renderEmptyState(
      "Let's set up your stock list",
      'Add your suppliers and items first, then your daily order list builds itself.',
      state.suppliers.length === 0 ? 'Add a supplier' : 'Add stock items',
      "goToSetup()"
    );
  }

  const incomingBreakdown = computeIncomingBreakdown(state.orders, state.orderDate);
  const activeFilterFields = FILTER_FIELDS.filter((f) => f.getOptions(state.items, state.suppliers).length > 0);
  let activeFilterDef = activeFilterFields.find((f) => f.key === state.filterField) || activeFilterFields[0];

  const list = state.items
    .map((it, idx) => ({ item: it, index: idx + 1 }))
    .filter((x) => !state.filterValue || !activeFilterDef || activeFilterDef.matches(x.item, state.filterValue))
    .filter((x) => !state.onlyOrderedForDate || ((incomingBreakdown[x.item.id] && incomingBreakdown[x.item.id].exact) || 0) > 0);

  const pendingEntryCount = Object.values(state.draftQty).filter((v) => parseFloat(v) > 0).length;
  const orderingForToday = state.orderDate === todayStr();

  const rowsHtml = list.map(({ item, index }) => {
    const draft = state.draftQty[item.id] || '';
    const b = incomingBreakdown[item.id] || { cumulative: 0, exact: 0, future: 0 };
    const hasIncoming = orderingForToday ? (b.exact > 0 || b.future > 0) : (b.cumulative > 0 || b.exact > 0 || b.future > 0);
    const supplier = state.suppliers.find((s) => s.id === item.supplierId);
    const pickupWarehouse = state.warehouses.find((w) => w.id === effectivePickupWarehouseId(item, supplier));
    const incomingText = hasIncoming
      ? (orderingForToday ? `${b.exact} | ${b.future}` : `${b.cumulative} | ${b.exact} | ${b.future}`)
      : '';
    const tagsHtml = (item.tags || []).length
      ? `<div class="row wrap" style="gap:4px;margin-top:2px;">${item.tags.map((t) => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>` : '';
    const nameLower = item.name.toLowerCase();
    const codeLower = (item.itemCode || '').toLowerCase();
    return `
      <div class="card" data-order-row data-name="${escapeHtml(nameLower)}" data-code="${escapeHtml(codeLower)}">
        <div class="row" style="gap:10px;">
          <span class="index-badge">#${index}</span>
          <div class="flex1">
            <div class="text-sm truncate" style="font-weight:500;color:var(--ink);">${escapeHtml(item.name)}</div>
            <div class="text-xs truncate muted">${escapeHtml(supplier ? supplier.name : 'No supplier')} · ${escapeHtml(pickupWarehouse ? pickupWarehouse.name : 'varies')}</div>
            ${tagsHtml}
            ${hasIncoming ? `<div class="text-xs truncate font-mono muted" data-incoming-text>${incomingText}</div>` : ''}
          </div>
          <div class="shrink0" style="text-align:center;">
            <span style="font-size:9px;text-transform:uppercase;letter-spacing:.03em;color:var(--forest);">Qty</span>
            <div class="row" style="gap:6px;">
              <input type="number" inputmode="decimal" placeholder="0" value="${draft}" data-draft-qty="${item.id}"
                class="qty-input" style="width:56px;">
              <button data-add-to-cart="${item.id}" class="stepper-btn" style="background:var(--forest);width:36px;height:36px;">
                ${icon('plus', 15, '#fff')}
              </button>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');

  return `
    <div>
      ${renderOrderDateHeader()}

      <section class="section">
        <div class="row-between mb2">
          <div class="section-label" style="margin-bottom:0;">Order list</div>
          <button id="addAllBtn" data-add-all class="btn-sm" ${pendingEntryCount === 0 ? 'disabled' : ''}
            style="display:flex;align-items:center;gap:6px;background:${pendingEntryCount > 0 ? 'var(--forest)' : 'var(--border)'};color:${pendingEntryCount > 0 ? '#fff' : 'var(--faint)'};">
            ${icon('plus', 13, pendingEntryCount > 0 ? '#fff' : 'var(--faint)')} <span id="addAllLabel">Add all${pendingEntryCount > 0 ? ` (${pendingEntryCount})` : ''} to cart</span>
          </button>
        </div>

        <p class="text-xs faint mb2">${orderingForToday ? 'Numbers = incoming today, incoming after today' : `Numbers = total incoming so far, incoming on ${formatDateLabel(state.orderDate)}, incoming after`}</p>

        <input type="search" id="orderSearch" placeholder="Search items or item code…" value="${escapeHtml(state.search)}" class="mb2">

        <div class="row wrap gap2 mb2">
          ${activeFilterFields.length > 1 ? `
            <select id="filterFieldSelect" style="width:auto;font-size:13px;padding:6px 8px;">
              ${activeFilterFields.map((f) => `<option value="${f.key}" ${f.key === (activeFilterDef && activeFilterDef.key) ? 'selected' : ''}>Filter by: ${f.label}</option>`).join('')}
            </select>` : ''}
          ${activeFilterDef ? `
            <select id="filterValueSelect" style="width:auto;font-size:13px;padding:6px 8px;">
              <option value="">All ${activeFilterDef.label.toLowerCase()}s</option>
              ${activeFilterDef.getOptions(state.items, state.suppliers).map((o) => `<option value="${escapeHtml(o.value)}" ${o.value === state.filterValue ? 'selected' : ''}>${escapeHtml(o.label)}</option>`).join('')}
            </select>` : ''}
          ${(state.filterValue || state.search || state.onlyOrderedForDate) ? `<button id="clearFiltersBtn" class="text-xs" style="font-weight:500;color:var(--amber-strong);">Clear filters</button>` : ''}
        </div>

        <label class="row" style="gap:8px;margin-bottom:12px;cursor:pointer;">
          <input type="checkbox" id="onlyOrderedCheckbox" ${state.onlyOrderedForDate ? 'checked' : ''}>
          <span class="text-xs muted">Only items already ordered for ${formatDateLabel(state.orderDate)}</span>
        </label>

        <div id="orderListRows" style="display:flex;flex-direction:column;gap:8px;">
          ${list.length === 0 ? `<p class="text-sm muted" style="text-align:center;padding:24px 0;">No items match your search.</p>` : rowsHtml}
        </div>
      </section>
    </div>`;
}

function renderOrderDateHeader() {
  const isToday = state.orderDate === todayStr();
  return `
    <section class="section" style="background:var(--forest);border-radius:16px;padding:16px;">
      <label class="block">
        <span class="text-xs" style="display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;color:var(--forest-light);">Ordering for delivery on</span>
        <input type="date" id="orderDateInput" value="${state.orderDate}" min="${todayStr()}"
          class="font-mono" style="width:100%;padding:10px 12px;border-radius:10px;border:none;background:var(--cream);color:var(--ink);font-size:15px;font-weight:600;">
      </label>
      <p class="text-xs" style="margin-top:8px;color:var(--forest-light);">
        ${isToday ? 'Today — for suppliers who can still deliver same-day.' : `${formatDateLabel(state.orderDate)} — you can adjust this per supplier below if one has a different cutoff, holiday, or closure.`}
      </p>
    </section>`;
}

function renderEmptyState(title, body, actionLabel, actionOnclick) {
  return `<div class="empty">
    <div class="title font-display">${escapeHtml(title)}</div>
    <div class="body">${escapeHtml(body)}</div>
    ${actionLabel ? `<button onclick="${actionOnclick}" class="btn btn-primary" style="width:auto;padding:10px 20px;">${escapeHtml(actionLabel)}</button>` : ''}
  </div>`;
}

function goToSetup() {
  setTab(state.suppliers.length === 0 ? 'suppliers' : 'stock');
}

// Cheap, no-rerender text filter: toggles visibility of existing rows instead of rebuilding the list.
function filterOrderListRows() {
  const q = state.search.trim().toLowerCase();
  document.querySelectorAll('[data-order-row]').forEach((el) => {
    const match = !q || el.dataset.name.includes(q) || el.dataset.code.includes(q);
    el.classList.toggle('hidden', !match);
  });
}


/* ============================================================
   CART TAB
   ============================================================ */
function renderCartTab() {
  const cartGroups = computeCartGroups();
  const incomingOrders = computeIncomingOrders();

  if (state.cart.length === 0 && incomingOrders.length === 0) {
    return renderEmptyState('Nothing in your cart yet', "Add quantities to items on the Orders tab and they'll show up here, ready to review and send.");
  }

  return `
    <div>
      ${renderPickupLocationsSummary()}
      ${cartGroups.length > 0 ? `
        <section class="section">
          <div class="section-label">In your cart — ready to send</div>
          <div style="display:flex;flex-direction:column;gap:12px;">
            ${cartGroups.map((g) => renderSupplierCartCard(g)).join('')}
          </div>
        </section>` : ''}
      ${renderIncomingSection(incomingOrders)}
    </div>`;
}

function renderPickupLocationsSummary() {
  if (state.cart.length === 0) return '';
  const counts = {};
  state.cart.forEach((c) => {
    const found = c.pickupWarehouseId && state.warehouses.find((w) => w.id === c.pickupWarehouseId);
    const label = found ? found.name : 'Not set';
    counts[label] = (counts[label] || 0) + 1;
  });
  return `
    <section class="section">
      <div class="section-label">Pickup locations</div>
      <div class="row wrap gap2">
        ${Object.entries(counts).map(([name, count]) => `
          <div class="chip" style="background:${name === 'Not set' ? 'var(--amber-bg)' : '#fff'};color:${name === 'Not set' ? 'var(--amber-text)' : 'var(--ink)'};border:1px solid ${name === 'Not set' ? 'var(--amber-border)' : 'var(--border)'};">
            ${icon('mapPin', 12)} ${escapeHtml(name)} (${count})
          </div>`).join('')}
      </div>
    </section>`;
}

function renderSupplierCartCard(g) {
  const supplierDate = state.dateOverrides[g.supplier.id] || state.orderDate;
  const isOverridden = !!state.dateOverrides[g.supplier.id];
  return `
    <div class="card" data-supplier-card="${g.supplier.id}">
      <div class="row-between mb2">
        <span class="font-display" style="font-weight:600;color:var(--ink);">${escapeHtml(g.supplier.name)}</span>
        <button data-send-supplier="${g.supplier.id}" class="btn-sm btn-whatsapp" style="display:flex;align-items:center;gap:6px;">
          ${icon('send', 14, '#fff')} Send
        </button>
      </div>
      <div class="row" style="gap:8px;margin-bottom:10px;">
        <input type="date" data-supplier-date="${g.supplier.id}" value="${supplierDate}" min="${todayStr()}"
          class="font-mono" style="width:auto;padding:5px 8px;font-size:12.5px;border-radius:8px;border:1px solid ${isOverridden ? 'var(--amber-strong)' : 'var(--border)'};background:${isOverridden ? 'var(--amber-bg)' : 'var(--cream)'};">
        ${isOverridden ? `<span class="text-xs" style="color:var(--amber-strong);">different from your usual date</span>` : ''}
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;">
        ${g.lines.map((l) => renderCartLineRow(l, g.supplier.id)).join('')}
      </div>
    </div>`;
}

function renderCartLineRow(l, supplierIdForCard) {
  const pickupWh = l.pickupWarehouseId && state.warehouses.find((w) => w.id === l.pickupWarehouseId);
  const isEditingPickup = state.editingPickupFor === l.id;
  const isEditingSupplier = state.editingSupplierFor === l.id;
  return `
    <div class="text-sm" data-cart-line="${l.id}">
      <div class="row-between">
        <div class="flex1">
          <span style="color:var(--ink-soft);">${escapeHtml(l.item.name)}</span>
          ${l.toOwnWarehouse ? `<span class="text-xs" style="margin-left:4px;font-weight:600;color:var(--amber-text);">(W)</span>` : ''}
          ${l.supplierOverride ? `<div class="text-xs" style="color:var(--amber-strong);">moved from ${escapeHtml((state.suppliers.find((s) => s.id === l.item.supplierId) || {}).name || 'original supplier')}</div>` : ''}
          <div class="text-xs" style="color:${pickupWh ? 'var(--muted)' : 'var(--amber-strong)'};">${pickupWh ? escapeHtml(pickupWh.name) : 'no pickup location set'}</div>
        </div>
        <div class="row shrink0" style="gap:6px;">
          <div class="row" style="gap:4px;">
            <button data-qty-step="${l.id}:-1" class="stepper-btn" style="background:var(--tint);width:24px;height:24px;">${icon('minus', 12, 'var(--muted)')}</button>
            <span class="font-mono text-sm" style="width:44px;text-align:center;">${l.qty}${l.item.unit ? ' ' + escapeHtml(l.item.unit) : ''}</span>
            <button data-qty-step="${l.id}:1" class="stepper-btn" style="background:var(--green);width:24px;height:24px;">${icon('plus', 12, 'var(--forest)')}</button>
          </div>
          <button data-toggle-warehouse="${l.id}" title="Deliver to our own warehouse, not the shop"
            style="width:24px;height:24px;border-radius:999px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;background:${l.toOwnWarehouse ? 'var(--amber-bg)' : 'transparent'};color:${l.toOwnWarehouse ? 'var(--amber-text)' : 'var(--faint)'};border:1px solid ${l.toOwnWarehouse ? 'var(--amber-border)' : 'var(--border)'};">W</button>
          <button data-edit-pickup="${l.id}" title="Set pickup warehouse">${icon('mapPin', 14, l.pickupWarehouseId ? 'var(--faint)' : 'var(--amber-strong)')}</button>
          <button data-edit-supplier="${l.id}" title="Move to a different supplier">${icon('repeat', 14, 'var(--faint)')}</button>
          <button data-remove-line="${l.id}">${icon('x', 14, 'var(--faint)')}</button>
        </div>
      </div>
      ${isEditingPickup ? `
        <div class="mt1" style="display:flex;">
          <select data-set-pickup="${l.id}" style="font-size:13px;padding:6px 8px;">
            <option value="">Not set</option>
            ${state.warehouses.map((w) => `<option value="${w.id}" ${w.id === l.pickupWarehouseId ? 'selected' : ''}>${escapeHtml(w.name)}</option>`).join('')}
          </select>
        </div>` : ''}
      ${isEditingSupplier ? `
        <div class="mt1" style="display:flex;">
          <select data-set-supplier="${l.id}" style="font-size:13px;padding:6px 8px;">
            ${state.suppliers.map((s) => `<option value="${s.id}" ${s.id === (l.supplierOverride || l.item.supplierId) ? 'selected' : ''}>${escapeHtml(s.name)}</option>`).join('')}
          </select>
        </div>` : ''}
    </div>`;
}

function renderIncomingSection(incomingOrders) {
  if (incomingOrders.length === 0) return '';
  const availableDates = Array.from(new Set(incomingOrders.map((o) => o.expectedDate || todayStr()))).sort();
  const visibleDates = !state.incomingFilterDate
    ? availableDates
    : state.incomingCumulative
      ? availableDates.filter((d) => d <= state.incomingFilterDate)
      : availableDates.filter((d) => d === state.incomingFilterDate);

  return `
    <section class="section">
      <div class="section-label">Incoming — already ordered</div>
      <p class="text-xs faint mb2">These drop off automatically once their delivery day has passed, so they won't get double-ordered.</p>
      <div class="row wrap gap2 mb2">
        <select id="incomingFilterDateSelect" style="width:auto;font-size:13px;padding:6px 8px;">
          <option value="">All upcoming dates</option>
          ${availableDates.map((d) => `<option value="${d}" ${d === state.incomingFilterDate ? 'selected' : ''}>${formatDateLabel(d)}</option>`).join('')}
        </select>
        ${state.incomingFilterDate ? `
          <div class="segmented">
            <button data-incoming-mode="only" class="${!state.incomingCumulative ? 'active' : ''}">Only that date</button>
            <button data-incoming-mode="through" class="${state.incomingCumulative ? 'active' : ''}">Through that date</button>
          </div>` : ''}
      </div>
      ${visibleDates.map((dateStr) => {
        const group = incomingOrders.filter((o) => (o.expectedDate || todayStr()) === dateStr);
        return `
          <div class="mb2">
            <div class="text-xs" style="font-weight:500;margin-bottom:6px;color:var(--forest);">Expected ${formatDateLabel(dateStr)}</div>
            <div style="display:flex;flex-direction:column;gap:8px;">
              ${group.map((o) => `
                <div class="card">
                  <div class="row-between">
                    <div class="text-sm" style="font-weight:500;color:var(--ink);">${escapeHtml(o.supplierName)}</div>
                    <button data-undo-order="${o.id}" class="btn-sm" style="color:var(--red-text);background:var(--red-bg);">Undo</button>
                  </div>
                  <div class="text-xs muted mb1">Ordered ${new Date(o.placedAt).toLocaleDateString(undefined, { weekday: 'short', hour: '2-digit', minute: '2-digit' })}</div>
                  <div class="text-xs muted">${o.items.map((l) => `${escapeHtml(l.name)} x${l.qty}${l.toOwnWarehouse ? ' (W)' : ''}`).join(', ')}</div>
                </div>`).join('')}
            </div>
          </div>`;
      }).join('')}
    </section>`;
}


/* ============================================================
   STOCK TAB
   ============================================================ */
function renderStockTab() {
  const filtered = state.items.map((item, idx) => ({ item, originalIndex: idx }));

  const rows = filtered.map(({ item, originalIndex: idx }) => {
    const supplier = state.suppliers.find((s) => s.id === item.supplierId);
    const pickupWarehouse = state.warehouses.find((w) => w.id === effectivePickupWarehouseId(item, supplier));
    return `
      <div class="card row" style="gap:8px;padding:12px;" data-stock-row data-name="${escapeHtml(item.name.toLowerCase())}" data-code="${escapeHtml((item.itemCode || '').toLowerCase())}">
        <div style="display:flex;flex-direction:column;flex-shrink:0;">
          <button data-move-item="${item.id}:up" ${idx === 0 ? 'disabled' : ''} style="opacity:${idx === 0 ? .3 : 1};">${icon('chevronUp', 16, 'var(--muted)')}</button>
          <button data-move-item="${item.id}:down" ${idx === state.items.length - 1 ? 'disabled' : ''} style="opacity:${idx === state.items.length - 1 ? .3 : 1};">${icon('chevronDown', 16, 'var(--muted)')}</button>
        </div>
        <button data-edit-item="${item.id}" class="flex1 row" style="gap:10px;text-align:left;min-width:0;">
          <span class="index-badge">#${idx + 1}</span>
          <div class="flex1" style="min-width:0;">
            <div class="text-sm truncate" style="font-weight:500;color:var(--ink);">
              ${escapeHtml(item.name)}${item.itemCode ? ` <span class="font-mono text-xs faint">${escapeHtml(item.itemCode)}</span>` : ''}
            </div>
            <div class="text-xs truncate muted">${escapeHtml(supplier ? supplier.name : 'No supplier')} · stock ${item.stock}${item.unit ? ' ' + escapeHtml(item.unit) : ''} · par ${item.par}${item.parByDay && Object.keys(item.parByDay).length ? ' · varies by day' : ''}</div>
            <div class="text-xs truncate" style="color:${item.defaultWarehouseId ? 'var(--amber-strong)' : 'var(--muted)'};">pickup: ${escapeHtml(pickupWarehouse ? pickupWarehouse.name : 'varies')}${item.defaultWarehouseId ? ' (item-specific)' : ''}</div>
          </div>
        </button>
        <button data-insert-item="${item.id}" title="Insert new item after this one" class="shrink0" style="padding:6px;">${icon('cornerDownRight', 16, 'var(--faint)')}</button>
      </div>`;
  }).join('');

  return `
    <div>
      <button data-open-item-modal class="btn btn-primary mb2" style="display:flex;align-items:center;gap:6px;">${icon('plus', 16, '#fff')} Add stock item</button>
      <p class="text-xs faint" style="margin-bottom:12px;">Order items to match your stockroom layout. Use the arrows to reorder, or "insert here" to slot a new item into place.</p>
      <input type="search" id="stockSearch" placeholder="Search items or item code…" value="${escapeHtml(state.stockSearch)}" class="mb2">
      ${state.items.length === 0
        ? renderEmptyState('No items yet', 'Add the products you regularly order from your suppliers.')
        : `<p id="stockNoMatches" class="text-sm muted hidden" style="text-align:center;padding:24px 0;">No items match your search.</p>
           <div id="stockListRows" style="display:flex;flex-direction:column;gap:8px;">${rows}</div>`}
    </div>`;
}

function filterStockRows() {
  const q = state.stockSearch.trim().toLowerCase();
  let anyVisible = false;
  document.querySelectorAll('[data-stock-row]').forEach((el) => {
    const match = !q || el.dataset.name.includes(q) || el.dataset.code.includes(q);
    el.classList.toggle('hidden', !match);
    if (match) anyVisible = true;
  });
  const noMatches = document.getElementById('stockNoMatches');
  if (noMatches) noMatches.classList.toggle('hidden', anyVisible || !q);
}


/* ============================================================
   SUPPLIERS TAB (+ collapsible Warehouses subsection, driver messages)
   ============================================================ */
function renderSuppliersTab() {
  const ordersForDate = state.orders.filter((o) => isStillIncoming(o) && (o.expectedDate || todayStr()) === state.orderDate);

  const supplierRows = state.suppliers.map((s) => {
    const count = state.items.filter((i) => i.supplierId === s.id).length;
    const defaultWarehouse = state.warehouses.find((w) => w.id === s.defaultWarehouseId);
    const orderedQty = ordersForDate.filter((o) => o.supplierId === s.id).flatMap((o) => o.items).reduce((sum, l) => sum + l.qty, 0);
    return `
      <button data-edit-supplier-modal="${s.id}" class="card" style="display:flex;align-items:center;justify-content:space-between;text-align:left;width:100%;">
        <div>
          <div class="text-sm" style="font-weight:500;color:var(--ink);">${escapeHtml(s.name)}</div>
          <div class="text-xs muted">${count} item${count === 1 ? '' : 's'} · ${escapeHtml(s.whatsapp || 'no number set')} · pickup: ${escapeHtml(defaultWarehouse ? defaultWarehouse.name : 'varies')}</div>
          <div class="text-xs" style="color:${orderedQty > 0 ? 'var(--amber-strong)' : 'var(--faint)'};">${orderedQty} ordered (${formatDateLabel(state.orderDate)})</div>
        </div>
        ${icon('chevronRight', 16, 'var(--faint)')}
      </button>`;
  }).join('');

  const warehouseRows = state.warehouses.map((w) => {
    const qty = ordersForDate.flatMap((o) => o.items).filter((l) => l.pickupWarehouseId === w.id).reduce((sum, l) => sum + l.qty, 0);
    const checked = state.selectedWarehousesForDriverMsg.includes(w.id);
    return `
      <div class="card row" style="gap:10px;">
        <input type="checkbox" data-select-warehouse="${w.id}" ${checked ? 'checked' : ''} style="width:18px;height:18px;flex-shrink:0;">
        <button data-edit-warehouse-modal="${w.id}" class="flex1 row-between" style="text-align:left;">
          <div class="row" style="gap:10px;">
            ${icon('building', 16, 'var(--forest)')}
            <div>
              <div class="text-sm" style="font-weight:500;color:var(--ink);">${escapeHtml(w.name)}</div>
              <div class="text-xs" style="color:${qty > 0 ? 'var(--amber-strong)' : 'var(--faint)'};">${qty} to pick up (${formatDateLabel(state.orderDate)})</div>
            </div>
          </div>
          ${icon('chevronRight', 16, 'var(--faint)')}
        </button>
      </div>`;
  }).join('');

  const unassignedQty = ordersForDate.flatMap((o) => o.items)
    .filter((l) => !l.pickupWarehouseId || !state.warehouses.some((w) => w.id === l.pickupWarehouseId))
    .reduce((sum, l) => sum + l.qty, 0);

  return `
    <div>
      <button data-open-supplier-modal class="btn btn-primary mb2" style="display:flex;align-items:center;gap:6px;">${icon('plus', 16, '#fff')} Add supplier</button>
      <button data-load-real-data class="btn mb2" style="background:var(--green);color:var(--forest);border:1px solid #B7CFC9;font-size:13px;">Load data from your ORDERING spreadsheet</button>

      <button data-toggle-suppliers class="row-between" style="width:100%;margin-bottom:8px;">
        <span class="section-label" style="margin-bottom:0;">Suppliers (${state.suppliers.length})</span>
        ${icon(state.showSuppliers ? 'chevronUp' : 'chevronDown', 16, 'var(--faint)')}
      </button>
      ${state.showSuppliers ? (
        state.suppliers.length === 0
          ? renderEmptyState('No suppliers yet', "Add a supplier with their WhatsApp number to start ordering.")
          : `<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">${supplierRows}</div>`
      ) : ''}

      <button data-toggle-warehouses class="row-between" style="width:100%;margin-top:24px;margin-bottom:8px;">
        <span class="section-label" style="margin-bottom:0;">Storage warehouses (${state.warehouses.length})</span>
        ${icon(state.showWarehouses ? 'chevronUp' : 'chevronDown', 16, 'var(--faint)')}
      </button>
      ${state.showWarehouses ? `
        <div>
          <button data-open-warehouse-modal class="btn btn-primary mb2" style="display:flex;align-items:center;gap:6px;">${icon('plus', 16, '#fff')} Add warehouse</button>
          <p class="text-xs faint mb2">These are the storage/pickup locations your suppliers use — where your driver actually collects stock from. Tick any to build a collection message for a driver.</p>
          ${state.warehouses.length === 0
            ? renderEmptyState('No warehouses yet', 'Add the storage warehouses you collect stock from — you can then link suppliers to their usual pickup point.')
            : `
              <div style="display:flex;flex-direction:column;gap:8px;">
                ${state.selectedWarehousesForDriverMsg.length > 0 ? `
                  <button data-open-driver-modal class="btn" style="background:var(--whatsapp);color:#fff;display:flex;align-items:center;gap:6px;">
                    ${icon('send', 15, '#fff')} Driver message for ${state.selectedWarehousesForDriverMsg.length} warehouse${state.selectedWarehousesForDriverMsg.length === 1 ? '' : 's'}
                  </button>` : ''}
                ${warehouseRows}
                ${unassignedQty > 0 ? `
                  <div class="card" style="background:var(--amber-bg);border-color:var(--amber-border);">
                    <div class="text-xs" style="color:var(--amber-text);">${unassignedQty} unit${unassignedQty === 1 ? '' : 's'} ordered for ${formatDateLabel(state.orderDate)} ${unassignedQty === 1 ? "isn't" : "aren't"} assigned to any pickup warehouse.</div>
                  </div>` : ''}
              </div>`}
        </div>` : ''}
    </div>`;
}


/* ============================================================
   MODAL SYSTEM
   ============================================================ */
function openModal(modal) {
  state.modal = modal;
  renderModal();
}
function closeModal() {
  state.modal = null;
  document.getElementById('modalRoot').innerHTML = '';
  renderTab(); // underlying data likely changed
}
function renderModal() {
  const root = document.getElementById('modalRoot');
  if (!state.modal) { root.innerHTML = ''; return; }
  const m = state.modal;
  if (m.type === 'item') root.innerHTML = renderItemForm(m);
  else if (m.type === 'supplier') root.innerHTML = renderSupplierForm(m);
  else if (m.type === 'warehouse') root.innerHTML = renderWarehouseForm(m);
  else if (m.type === 'driver') root.innerHTML = renderDriverMessageModal();
  wireModalEvents();
}

function modalShell(title, bodyHtml) {
  return `
    <div class="modal-page" id="modalPage">
      <div class="modal-head">
        <h2>${escapeHtml(title)}</h2>
        <button data-close-modal class="modal-close">${icon('x', 18, 'var(--muted)')}</button>
      </div>
      <div class="modal-body">${bodyHtml}</div>
    </div>`;
}

function fieldHtml(label, innerHtml) {
  return `<div class="field"><label>${escapeHtml(label)}</label>${innerHtml}</div>`;
}

/* ---- Item form ---- */
function renderItemForm(m) {
  const item = m.mode === 'edit' ? m.data : null;
  const insertAfterId = m.insertAfterId;
  const insertAfterItem = insertAfterId ? state.items.find((i) => i.id === insertAfterId) : null;
  const d = m.draft; // draft object holding current field values

  const supplier = state.suppliers.find((s) => s.id === d.supplierId);
  const supplierDefaultWarehouse = state.warehouses.find((w) => w.id === (supplier && supplier.defaultWarehouseId));

  const canSave = d.name.trim() && d.supplierId;

  const dayInputs = WEEKDAYS.map((label, idx) => `
    <label style="display:block;">
      <span style="display:block;font-size:10px;margin-bottom:2px;text-align:center;color:var(--faint);">${label}</span>
      <input type="number" inputmode="decimal" placeholder="${d.par}" value="${d.parByDay[idx] != null ? d.parByDay[idx] : ''}"
        data-day-par="${idx}" class="font-mono" style="width:100%;padding:6px 2px;border-radius:8px;border:1px solid var(--border);background:var(--cream);font-size:13px;text-align:center;">
    </label>`).join('');

  const body = `
    ${insertAfterItem ? `<p class="text-xs" style="background:var(--tint);color:var(--muted);padding:6px 8px;border-radius:8px;margin-bottom:12px;">Will be inserted right after "${escapeHtml(insertAfterItem.name)}"</p>` : ''}
    ${fieldHtml('Item name', `<input type="text" id="f_name" value="${escapeHtml(d.name)}" placeholder="e.g. Tomatoes">`)}
    ${fieldHtml('Item code (optional)', `<input type="text" id="f_itemCode" value="${escapeHtml(d.itemCode)}" placeholder="e.g. BF-STRIP-01">`)}
    ${fieldHtml('Supplier', `<select id="f_supplierId">${state.suppliers.length === 0 ? '<option value="">Add a supplier first</option>' : ''}${state.suppliers.map((s) => `<option value="${s.id}" ${s.id === d.supplierId ? 'selected' : ''}>${escapeHtml(s.name)}</option>`).join('')}</select>`)}
    ${fieldHtml('Pickup warehouse', `<select id="f_defaultWarehouseId">
        <option value="">${supplierDefaultWarehouse ? `Use supplier default (${escapeHtml(supplierDefaultWarehouse.name)})` : 'Varies by order'}</option>
        ${state.warehouses.map((w) => `<option value="${w.id}" ${w.id === d.defaultWarehouseId ? 'selected' : ''}>${escapeHtml(w.name)}</option>`).join('')}
      </select>`)}
    <p class="hint">Only set this if this specific product is stored somewhere different from the supplier's usual warehouse.</p>
    <div class="row gap2">
      <div class="flex1">${fieldHtml('Unit (optional)', `<input type="text" id="f_unit" value="${escapeHtml(d.unit)}" placeholder="boxes, kg, cases">`)}</div>
      <div class="flex1">${fieldHtml('Default par level', `<input type="number" inputmode="decimal" id="f_par" value="${d.par}">`)}</div>
    </div>
    ${fieldHtml('Current stock', `<input type="number" inputmode="decimal" id="f_stock" value="${d.stock}">`)}
    ${fieldHtml('Tags (optional)', `<input type="text" id="f_tagsText" value="${escapeHtml(d.tagsText)}" placeholder="e.g. slow-moving, frozen, seasonal">`)}
    <p class="hint">Comma-separated. Make up whatever labels are useful to you — you'll be able to filter the order list by them.</p>
    <label class="row" style="gap:8px;margin-bottom:12px;cursor:pointer;">
      <input type="checkbox" id="f_varyByDay" ${d.varyByDay ? 'checked' : ''}>
      <span class="text-sm">Par level varies by day of week</span>
    </label>
    ${d.varyByDay ? `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;">${dayInputs}</div>` : ''}
    <p class="hint" style="margin-top:${d.varyByDay ? '0' : '-8px'};">${d.varyByDay ? 'Leave a day blank to fall back to the default par.' : "Par level is the amount you want on hand — order suggestions are based on this, but you can always type your own order qty on the Orders screen."}</p>
    ${!canSave ? `<p class="warn-hint">${!d.name.trim() ? 'Enter an item name to save.' : 'Choose a supplier to save.'}</p>` : ''}
    <div class="row gap2 mt2">
      <button data-close-modal class="btn" style="background:var(--tint);color:var(--muted);width:auto;padding:10px 16px;">Cancel</button>
      <button data-save-item class="btn btn-primary flex1" ${!canSave ? 'disabled' : ''}>Save</button>
      ${item ? `<button data-delete-item="${item.id}" class="btn" style="background:var(--red-bg);color:var(--red-text);width:auto;padding:10px 16px;">${icon('trash', 16, 'var(--red-text)')}</button>` : ''}
    </div>`;

  return modalShell(item ? 'Edit item' : 'Add stock item', body);
}

/* ---- Supplier form ---- */
function renderSupplierForm(m) {
  const supplier = m.mode === 'edit' ? m.data : null;
  const d = m.draft;
  const hasItems = supplier ? state.items.some((i) => i.supplierId === supplier.id) : false;
  const canSave = d.name.trim();

  const body = `
    ${fieldHtml('Supplier name', `<input type="text" id="f_name" value="${escapeHtml(d.name)}" placeholder="e.g. Fresh Veg Co">`)}
    ${fieldHtml('WhatsApp number', `<input type="tel" id="f_whatsapp" value="${escapeHtml(d.whatsapp)}" placeholder="Country code + number, e.g. 447911123456">`)}
    <p class="hint">No spaces, no "+". Example: UK number 07911 123456 becomes 447911123456.</p>
    ${fieldHtml('Default pickup warehouse', `<select id="f_defaultWarehouseId">
        <option value="">Varies by order</option>
        ${state.warehouses.map((w) => `<option value="${w.id}" ${w.id === d.defaultWarehouseId ? 'selected' : ''}>${escapeHtml(w.name)}</option>`).join('')}
      </select>`)}
    <p class="hint">If this supplier always drops stock at the same warehouse, set it here — it'll auto-fill when you add their items to your cart. Leave as "Varies" if it changes order to order.</p>
    <label class="row" style="gap:8px;margin-bottom:12px;cursor:pointer;">
      <input type="checkbox" id="f_isInternalAccount" ${d.isInternalAccount ? 'checked' : ''}>
      <span class="text-sm">This is an internal account, not an outside supplier</span>
    </label>
    <p class="hint">For accounts like your own warehouse or company-held stock at a location. Messages get prefixed with the supplier's name so whoever receives it knows which account it's for.</p>
    <div class="row gap2 mt2">
      <button data-close-modal class="btn" style="background:var(--tint);color:var(--muted);width:auto;padding:10px 16px;">Cancel</button>
      <button data-save-supplier class="btn btn-primary flex1" ${!canSave ? 'disabled' : ''}>Save</button>
      ${supplier ? `<button data-delete-supplier="${supplier.id}" ${hasItems ? 'disabled' : ''} title="${hasItems ? 'Reassign or remove items from this supplier first' : 'Delete supplier'}" class="btn" style="background:${hasItems ? 'var(--tint)' : 'var(--red-bg)'};color:${hasItems ? 'var(--faint)' : 'var(--red-text)'};width:auto;padding:10px 16px;">${icon('trash', 16, hasItems ? 'var(--faint)' : 'var(--red-text)')}</button>` : ''}
    </div>
    ${supplier && hasItems ? `<p class="text-xs faint mt2">Can't delete — items are still linked to this supplier.</p>` : ''}`;

  return modalShell(supplier ? 'Edit supplier' : 'Add supplier', body);
}

/* ---- Warehouse form ---- */
function renderWarehouseForm(m) {
  const warehouse = m.mode === 'edit' ? m.data : null;
  const d = m.draft;
  const suppliersUsingIt = warehouse ? state.suppliers.filter((s) => s.defaultWarehouseId === warehouse.id).length : 0;
  const canSave = d.name.trim();

  const body = `
    ${fieldHtml('Warehouse name', `<input type="text" id="f_name" value="${escapeHtml(d.name)}" placeholder="e.g. KT Cold Store, abbreviations are fine">`)}
    <div class="row gap2 mt2">
      <button data-close-modal class="btn" style="background:var(--tint);color:var(--muted);width:auto;padding:10px 16px;">Cancel</button>
      <button data-save-warehouse class="btn btn-primary flex1" ${!canSave ? 'disabled' : ''}>Save</button>
      ${warehouse ? `<button data-delete-warehouse="${warehouse.id}" title="Delete warehouse" class="btn" style="background:var(--red-bg);color:var(--red-text);width:auto;padding:10px 16px;">${icon('trash', 16, 'var(--red-text)')}</button>` : ''}
    </div>
    ${warehouse && suppliersUsingIt > 0 ? `<p class="text-xs faint mt2">${suppliersUsingIt} supplier${suppliersUsingIt === 1 ? '' : 's'} default here — deleting will switch them to "varies by order."</p>` : ''}`;

  return modalShell(warehouse ? 'Edit warehouse' : 'Add warehouse', body);
}

/* ---- Driver message modal ---- */
function buildDriverMessage() {
  const ordersForDate = state.orders.filter((o) => isStillIncoming(o) && (o.expectedDate || todayStr()) === state.orderDate);
  return state.warehouses
    .filter((w) => state.selectedWarehousesForDriverMsg.includes(w.id))
    .map((w) => {
      const linesHere = ordersForDate.flatMap((o) => o.items).filter((l) => l.pickupWarehouseId === w.id);
      const total = linesHere.reduce((sum, l) => sum + l.qty, 0);
      const grouped = {};
      linesHere.filter((l) => l.toOwnWarehouse).forEach((l) => { grouped[l.name] = (grouped[l.name] || 0) + l.qty; });
      const breakdown = Object.entries(grouped).map(([name, qty]) => `${name}${qty}`);
      return [`${w.name}${total}`, ...breakdown].join('\n');
    })
    .join('\n\n');
}

function renderDriverMessageModal() {
  const msg = buildDriverMessage();
  const body = `
    <p class="text-xs faint mb2">Header line is the warehouse's total to collect. Lines under it (if any) are the items to split off for 金發 — everything else goes to the main shop.</p>
    <pre class="font-mono text-sm mb2" style="background:#F7F5EF;border:1px solid var(--border);color:var(--ink);padding:12px;border-radius:10px;white-space:pre-wrap;">${escapeHtml(msg || 'Nothing to collect for the selected warehouse(s).')}</pre>
    <button data-send-driver-message class="btn" style="background:var(--whatsapp);color:#fff;display:flex;align-items:center;gap:6px;margin-bottom:8px;">${icon('send', 15, '#fff')} Send via WhatsApp</button>
    <p class="text-xs faint" id="driverSendStatus">Opens WhatsApp with the message ready — you pick the driver(s) or group to send it to.</p>`;
  return modalShell('Driver collection message', body);
}


/* ============================================================
   OPEN-MODAL HELPERS — set up the initial draft object for each form
   ============================================================ */
function openItemModal(mode, item, insertAfterId) {
  const draft = item ? {
    name: item.name, itemCode: item.itemCode || '', supplierId: item.supplierId,
    unit: item.unit || '件', par: item.par ?? 0, stock: item.stock ?? 0,
    varyByDay: !!(item.parByDay && Object.keys(item.parByDay).length),
    parByDay: item.parByDay || {}, tagsText: (item.tags || []).join(', '),
    defaultWarehouseId: item.defaultWarehouseId || '',
  } : {
    name: '', itemCode: '', supplierId: (state.suppliers[0] && state.suppliers[0].id) || '',
    unit: '件', par: 0, stock: 0, varyByDay: false, parByDay: {}, tagsText: '', defaultWarehouseId: '',
  };
  openModal({ type: 'item', mode, data: item, insertAfterId: insertAfterId || null, draft });
}

function openSupplierModal(mode, supplier) {
  const draft = supplier ? {
    name: supplier.name, whatsapp: supplier.whatsapp || '',
    defaultWarehouseId: supplier.defaultWarehouseId || '', isInternalAccount: !!supplier.isInternalAccount,
  } : { name: '', whatsapp: '', defaultWarehouseId: '', isInternalAccount: false };
  openModal({ type: 'supplier', mode, data: supplier, draft });
}

function openWarehouseModal(mode, warehouse) {
  const draft = warehouse ? { name: warehouse.name } : { name: '' };
  openModal({ type: 'warehouse', mode, data: warehouse, draft });
}

/* Re-reads visible form inputs into the draft object, then re-renders the modal.
   Used when a change needs to alter the form's shape (e.g. toggling "vary by day"). */
function refreshItemDraftFromDom() {
  const d = state.modal.draft;
  d.name = document.getElementById('f_name').value;
  d.itemCode = document.getElementById('f_itemCode').value;
  d.supplierId = document.getElementById('f_supplierId').value;
  d.defaultWarehouseId = document.getElementById('f_defaultWarehouseId').value;
  d.unit = document.getElementById('f_unit').value;
  d.par = parseFloat(document.getElementById('f_par').value) || 0;
  d.stock = parseFloat(document.getElementById('f_stock').value) || 0;
  d.tagsText = document.getElementById('f_tagsText').value;
  d.varyByDay = document.getElementById('f_varyByDay').checked;
  if (d.varyByDay) {
    WEEKDAYS.forEach((_, idx) => {
      const el = document.querySelector(`[data-day-par="${idx}"]`);
      if (el) d.parByDay[idx] = el.value === '' ? '' : (parseFloat(el.value) || 0);
    });
  }
}

/* ============================================================
   EVENT DELEGATION — bound once to stable containers, survives re-renders
   ============================================================ */
function initEventListeners() {
  const main = document.getElementById('mainContent');
  const modalRoot = document.getElementById('modalRoot');

  main.addEventListener('click', onMainClick);
  main.addEventListener('input', onMainInput);
  main.addEventListener('change', onMainChange);
  modalRoot.addEventListener('click', onModalClick);
  modalRoot.addEventListener('input', onModalInput);
  modalRoot.addEventListener('change', onModalChange);
}
// renderTab()/renderModal() call these as no-ops now that listeners are global; kept for clarity at call sites.
function wireTabEvents() {}
function wireModalEvents() {}

function onMainClick(e) {
  const t = e.target;
  if (t.id === 'clearFiltersBtn') { state.filterValue = ''; state.search = ''; state.onlyOrderedForDate = false; renderTab(); return; }
  const btn = t.closest('button');
  if (!btn) return;

  if (btn.dataset.addToCart) { addToCart(btn.dataset.addToCart, parseFloat(document.querySelector(`[data-draft-qty="${btn.dataset.addToCart}"]`).value) || 0); renderTab(); return; }
  if (btn.hasAttribute('data-add-all')) { addAllToCart(); renderTab(); return; }
  if (btn.dataset.moveItem) { const [id, dir] = btn.dataset.moveItem.split(':'); moveItem(id, dir); return; }
  if (btn.dataset.editItem) { openItemModal('edit', state.items.find((i) => i.id === btn.dataset.editItem)); return; }
  if (btn.dataset.insertItem) { openItemModal('new', null, btn.dataset.insertItem); return; }
  if (btn.hasAttribute('data-open-item-modal')) { openItemModal('new', null); return; }

  if (btn.dataset.sendSupplier) {
    const group = computeCartGroups().find((g) => g.supplier.id === btn.dataset.sendSupplier);
    if (group) sendSupplierOrder(group, state.dateOverrides[btn.dataset.sendSupplier] || state.orderDate);
    return;
  }
  if (btn.dataset.qtyStep) {
    const [lineId, delta] = btn.dataset.qtyStep.split(':');
    const line = state.cart.find((c) => c.id === lineId);
    if (line) setCartQty(lineId, Math.max(0, Math.round((line.qty + parseFloat(delta)) * 10) / 10));
    renderTab();
    return;
  }
  if (btn.dataset.toggleWarehouse) { toggleCartWarehouse(btn.dataset.toggleWarehouse); renderTab(); return; }
  if (btn.dataset.editPickup) { state.editingPickupFor = state.editingPickupFor === btn.dataset.editPickup ? null : btn.dataset.editPickup; state.editingSupplierFor = null; renderTab(); return; }
  if (btn.dataset.editSupplier) { state.editingSupplierFor = state.editingSupplierFor === btn.dataset.editSupplier ? null : btn.dataset.editSupplier; state.editingPickupFor = null; renderTab(); return; }
  if (btn.dataset.removeLine) { setCartQty(btn.dataset.removeLine, 0); renderTab(); return; }
  if (btn.dataset.undoOrder) { cancelOrder(state.orders.find((o) => o.id === btn.dataset.undoOrder)); return; }
  if (btn.dataset.incomingMode) { state.incomingCumulative = btn.dataset.incomingMode === 'through'; renderTab(); return; }

  if (btn.hasAttribute('data-open-supplier-modal')) { openSupplierModal('new', null); return; }
  if (btn.dataset.editSupplierModal) { openSupplierModal('edit', state.suppliers.find((s) => s.id === btn.dataset.editSupplierModal)); return; }
  if (btn.hasAttribute('data-load-real-data')) {
    if (confirm(`This will replace your current suppliers, stock items, warehouses, cart and pending orders with data imported from your ORDERING spreadsheet. This can't be undone. Continue?`)) loadRealData();
    return;
  }
  if (btn.hasAttribute('data-toggle-suppliers')) { state.showSuppliers = !state.showSuppliers; renderTab(); return; }
  if (btn.hasAttribute('data-toggle-warehouses')) { state.showWarehouses = !state.showWarehouses; renderTab(); return; }
  if (btn.hasAttribute('data-open-warehouse-modal')) { openWarehouseModal('new', null); return; }
  if (btn.dataset.editWarehouseModal) { openWarehouseModal('edit', state.warehouses.find((w) => w.id === btn.dataset.editWarehouseModal)); return; }
  if (btn.hasAttribute('data-open-driver-modal')) { openModal({ type: 'driver' }); return; }
}

function onMainInput(e) {
  const t = e.target;
  if (t.dataset && t.dataset.draftQty) { state.draftQty[t.dataset.draftQty] = t.value; return; }
  if (t.id === 'orderSearch') { state.search = t.value; filterOrderListRows(); return; }
  if (t.id === 'stockSearch') { state.stockSearch = t.value; filterStockRows(); return; }
}

function onMainChange(e) {
  const t = e.target;
  if (t.id === 'orderDateInput') {
    if (t.value && t.value >= todayStr()) { state.orderDate = t.value; renderTab(); }
    return;
  }
  if (t.id === 'filterFieldSelect') { state.filterField = t.value; state.filterValue = ''; renderTab(); return; }
  if (t.id === 'filterValueSelect') { state.filterValue = t.value; renderTab(); return; }
  if (t.id === 'onlyOrderedCheckbox') { state.onlyOrderedForDate = t.checked; renderTab(); return; }
  if (t.dataset && t.dataset.supplierDate) {
    const val = t.value;
    if (!val || val < todayStr()) return;
    if (val === state.orderDate) delete state.dateOverrides[t.dataset.supplierDate];
    else state.dateOverrides[t.dataset.supplierDate] = val;
    renderTab();
    return;
  }
  if (t.dataset && t.dataset.setPickup) { setCartPickupWarehouse(t.dataset.setPickup, t.value); state.editingPickupFor = null; renderTab(); return; }
  if (t.dataset && t.dataset.setSupplier) { setCartSupplierOverride(t.dataset.setSupplier, t.value); state.editingSupplierFor = null; renderTab(); return; }
  if (t.id === 'incomingFilterDateSelect') { state.incomingFilterDate = t.value; renderTab(); return; }
  if (t.dataset && t.dataset.selectWarehouse) {
    const id = t.dataset.selectWarehouse;
    if (t.checked) state.selectedWarehousesForDriverMsg.push(id);
    else state.selectedWarehousesForDriverMsg = state.selectedWarehousesForDriverMsg.filter((x) => x !== id);
    renderTab();
    return;
  }
}


function onModalClick(e) {
  const t = e.target;
  const btn = t.closest('button');
  if (btn && btn.hasAttribute('data-close-modal')) { closeModal(); return; }

  if (btn && btn.hasAttribute('data-save-item')) {
    refreshItemDraftFromDom();
    const d = state.modal.draft;
    if (!d.name.trim() || !d.supplierId) return;
    const cleanParByDay = d.varyByDay
      ? Object.fromEntries(Object.entries(d.parByDay).filter(([, v]) => v !== '' && v != null))
      : {};
    const tags = d.tagsText.split(',').map((s) => s.trim()).filter(Boolean);
    saveItem({
      id: state.modal.data ? state.modal.data.id : undefined,
      name: d.name.trim(), itemCode: d.itemCode.trim(), supplierId: d.supplierId,
      unit: d.unit.trim(), par: d.par, stock: d.stock, parByDay: cleanParByDay, tags,
      defaultWarehouseId: d.defaultWarehouseId, insertAfterId: state.modal.insertAfterId,
    });
    return;
  }
  if (btn && btn.dataset.deleteItem) { deleteItem(btn.dataset.deleteItem); return; }

  if (btn && btn.hasAttribute('data-save-supplier')) {
    const d = state.modal.draft;
    if (!d.name.trim()) return;
    saveSupplier({
      id: state.modal.data ? state.modal.data.id : undefined,
      name: d.name.trim(), whatsapp: d.whatsapp.trim(),
      defaultWarehouseId: d.defaultWarehouseId, isInternalAccount: d.isInternalAccount,
    });
    return;
  }
  if (btn && btn.dataset.deleteSupplier) {
    const supplier = state.suppliers.find((s) => s.id === btn.dataset.deleteSupplier);
    const hasItems = supplier && state.items.some((i) => i.supplierId === supplier.id);
    if (!hasItems) deleteSupplier(btn.dataset.deleteSupplier);
    return;
  }

  if (btn && btn.hasAttribute('data-save-warehouse')) {
    const d = state.modal.draft;
    if (!d.name.trim()) return;
    saveWarehouse({ id: state.modal.data ? state.modal.data.id : undefined, name: d.name.trim() });
    return;
  }
  if (btn && btn.dataset.deleteWarehouse) { deleteWarehouse(btn.dataset.deleteWarehouse); return; }

  if (btn && btn.hasAttribute('data-send-driver-message')) {
    const msg = buildDriverMessage();
    sendOrShareMessage('', msg).then(() => {
      const statusEl = document.getElementById('driverSendStatus');
      if (statusEl) statusEl.textContent = 'Opened WhatsApp — pick your driver(s) or group.';
    });
    return;
  }
}

function onModalInput(e) {
  const t = e.target;
  if (t.id && t.id.startsWith('f_') && state.modal) {
    // Keep the draft roughly in sync as the user types (cheap; avoids losing text on unrelated re-renders).
    const d = state.modal.draft;
    const key = t.id.slice(2);
    if (key in d) d[key] = t.type === 'checkbox' ? t.checked : t.value;
  }
}

function onModalChange(e) {
  const t = e.target;
  if (!state.modal) return;
  if (t.id === 'f_varyByDay') { refreshItemDraftFromDom(); renderModal(); return; }
  if (t.id === 'f_supplierId' && state.modal.type === 'item') { refreshItemDraftFromDom(); renderModal(); return; }
}

/* ============================================================
   BOOTSTRAP
   ============================================================ */
initEventListeners();
setTab('today');

</script>
</body>
</html>
